    async function bulkShift() {
      if (selectedRows.size === 0) { showToast("Select rows first", "error"); return; }
      await loadFromFirebase();
      const dbs = Object.keys(savedDatabases).filter(n => n !== currentLoadedDbName);
      if (!dbs.length) { showToast("No other databases available", "error"); return; }
      showModal(`Shift ${selectedRows.size} Rows`,
        `<div class="mb-4"><label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Target Database</label><select id="targetDbSelect" class="input-modern mt-1"><option value="">-- Select Target --</option>${dbs.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('')}</select></div><div class="flex gap-6 mb-6 p-4 bg-white/15 border border-white/15 rounded-xl"><label class="flex items-center gap-2 text-sm font-medium cursor-pointer text-slate-700"><input type="radio" name="shiftAction" value="move" checked class="w-4 h-4 text-indigo-600"> Move (Delete original)</label><label class="flex items-center gap-2 text-sm font-medium cursor-pointer text-slate-700"><input type="radio" name="shiftAction" value="copy" class="w-4 h-4 text-indigo-600"> Copy (Keep original)</label></div><div class="flex gap-2"><button class="pill-btn flex-1 bg-white/25 text-sm" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern flex-1 text-sm" id="confirmShiftBtn">Execute Shift</button></div>`,
        (modal) => {
          modal.querySelector('#confirmShiftBtn').onclick = async () => {
            const target = modal.querySelector('#targetDbSelect').value,
              action = modal.querySelector('input[name="shiftAction"]:checked').value;
            if (!target) { showToast("Select target database", "error"); return; }
            modal.remove();
            await performBulkShift(target, action);
          };
        });
    }

    async function performBulkShift(targetDbName, action) {
      if (!savedDatabases[targetDbName]) { showToast("Target not found", "error"); return false; }
      const selected = Array.from(selectedRows).sort((a, b) => a - b);
      if (!selected.length) { showToast("No rows", "error"); return false; }
      let targetDb = savedDatabases[targetDbName];
      let { columns: targetCols, rows: targetRows, metadata: targetMeta } = parseFirebaseStructure(targetDb);
      for (let sc of workingTableColumns) {
        const exist = targetCols.find(tc => tc.name.toLowerCase() === sc.name.toLowerCase());
        if (!exist) {
          targetCols.push({
            id: genColId(), name: sc.name, type: sc.type, options: sc.options || [],
            dateFormat: sc.dateFormat || null
          });
        }
      }
      for (let idx of selected) {
        const srcRow = workingTableRows[idx];
        const shifted = {};
        targetCols.forEach(c => {
          const match = workingTableColumns.find(sc => sc.name.toLowerCase() === c.name.toLowerCase());
          if (match && srcRow[match.id] !== undefined) shifted[c.id] = srcRow[match.id];
          else shifted[c.id] = c.type === "number" ? 0 : c.type === "checkbox" ? false : c.type ===
            "multi-select" ? [] : c.type === "image" ? [] : "";
        });
        const meta = {
          comment: rowComments.get(idx) || '', starred: starredRows.has(idx) || false,
          priority: Date.now()
        };
        targetRows.push(shifted);
        const newIdx = targetRows.length - 1;
        targetMeta[newIdx] = {
          ...targetMeta[newIdx], comment: meta.comment, starred: meta.starred,
          priority: meta.priority
        };
        if (action === 'move') workingTableRows.splice(idx, 1);
      }
      if (action === 'move') {
        selectedRows.clear();
        if (editingRowIndex !== null) editingRowIndex = null;
        updateBulkDeleteButton();
      }
      const newStructure = buildDatabaseStructure(targetDbName, targetCols, targetRows);
      for (let idx in targetMeta) {
        const m = targetMeta[idx];
        const key = `row_${parseInt(idx) + 1}`;
        if (newStructure[key]) newStructure[key]['_meta'] = {
          comment: m.comment || '', starred: m.starred ||
            false, priority: m.priority || 0, updatedAt: new Date().toISOString()
        };
      }
      savedDatabases[targetDbName] = newStructure;
      if (action === 'move' && currentLoadedDbName) {
        const upd = buildDatabaseStructure(currentLoadedDbName, workingTableColumns, workingTableRows);
        savedDatabases[currentLoadedDbName] = upd;
      }
      await firebaseDB.ref(getDbRootPath()).set(savedDatabases);
      renderCards();
      await renderDatabaseList();
      showToast(`${selected.length} rows ${action === 'move' ? 'moved' : 'copied'} to "${targetDbName}"`,
        'success');
      return true;
    }

    function bulkDeleteRows() {
      if (selectedRows.size === 0) { showToast('No rows selected', 'error'); return; }
      showModal('Delete Rows',
        `<p class="text-sm text-slate-600 mb-6">Permanently delete ${selectedRows.size} selected row(s)?</p><div class="flex gap-3 justify-end"><button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern text-sm px-5 bg-rose-500 hover:bg-rose-600" id="confirmBulkDeleteBtn">Delete</button></div>`,
        (modal) => {
          modal.querySelector('#confirmBulkDeleteBtn').onclick = () => {
            modal.remove();
            const sorted = Array.from(selectedRows).sort((a, b) => b - a);
            sorted.forEach(i => workingTableRows.splice(i, 1));
            rowComments.clear();
            rowPriorities.clear();
            starredRows.clear();
            selectedRows.clear();
            workingTableRows.forEach((_, i) => rowPriorities.set(i, Date.now() - i));
            renderCards();
            updateBulkDeleteButton();
            showToast(`Deleted ${sorted.length} rows`, 'success');
          };
        });
    }

    // ============================================================
    // 11. EXPORT/IMPORT
    // ============================================================
    function exportJSONData() {
      const data = {
        name: currentLoadedDbName || "Working",
        columns: workingTableColumns,
        rows: workingTableRows,
        metadata: {
          comments: Array.from(rowComments.entries()),
          starred: Array.from(starredRows),
          priorities: Array.from(rowPriorities.entries()),
          imageFilenames: Array.from(imageFileNames.entries())
        }
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${currentLoadedDbName || 'table'}_export.json`;
      a.click();
      showToast("JSON exported", "success");
    }

    function exportExcel() {
      if (workingTableColumns.length === 0) { showToast("No data to export", "error"); return; }
      const sheetData = workingTableRows.map((r, idx) => {
        const obj = {
          'Row #': idx + 1, 'Starred': starredRows.has(idx) ? '⭐' : '', 'Comment': rowComments
            .get(idx) || ''
        };
        workingTableColumns.forEach(c => {
          let v = r[c.id];
          if (c.type === "checkbox") v = v ? "Yes" : "No";
          if (c.type === "multi-select" && Array.isArray(v)) v = v.join(', ');
          if (c.type === "image") {
            if (Array.isArray(v) && v.length) v = v.map(img => imageFileNames.get(img) || 'image')
              .join(', ');
            else if (typeof v === 'string' && v.startsWith('data:image')) v = imageFileNames.get(
              v) || '📷 Image';
            else v = '';
          }
          obj[c.name] = v !== undefined && v !== null && v !== "" ? v : "";
        });
        return obj;
      });
      const ws = XLSX.utils.json_to_sheet(sheetData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Data");
      XLSX.writeFile(wb, `${currentLoadedDbName || 'table'}_export.xlsx`);
      showToast("Excel exported", "success");
    }

    async function importExcel(file, isLast = true) {
      const reader = new FileReader();
      reader.onload = async function (e) {
        try {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });
          if (!json.length) throw new Error("Empty");
          const headers = Object.keys(json[0]).filter(h => !['Row #', 'Starred', 'Comment'].includes(h));
          const cols = headers.map(h => ({ id: genColId(), name: h, type: "text", options: [] }));
          const rows = [];
          for (let row of json) {
            const newRow = {};
            cols.forEach(c => {
              let v = row[c.name];
              if (typeof v === 'string' && v.startsWith('data:image')) {
                const imgCol = cols.find(x => x.name === c.name);
                if (imgCol) imgCol.type = 'image';
                newRow[c.id] = [v];
                imageFileNames.set(v, v.substring(0, 40) + '...');
              } else newRow[c.id] = v !== undefined ? v : "";
            });
            rows.push(newRow);
          }
          if (isLast) {
            showModal(`Import ${file.name}`,
              `<p class="text-sm text-slate-500 mb-6">Found ${rows.length} rows and ${cols.length} columns from "${file.name}".</p><div class="flex gap-3"><button id="importNewBtn" class="btn-modern flex-1 py-3 text-sm">Replace Existing</button><button id="importAppendBtn" class="pill-btn flex-1 py-3 bg-white/25 text-sm">Append Data</button></div>`,
              (modal) => {
                modal.querySelector('#importNewBtn').onclick = () => {
                  modal.remove();
                  workingTableColumns = cols;
                  workingTableRows = rows;
                  rowPriorities.clear();
                  workingTableRows.forEach((_, i) => rowPriorities.set(i, Date.now() - i));
                  currentLoadedDbName = null;
                  renderCards();
                  updateBulkDeleteButton();
                  document.getElementById("activeDbLabel").innerHTML =
                    `📝 Imported (${rows.length} rows)`;
                  showToast(`Loaded ${rows.length} rows from ${file.name}`, 'success');
                };
                modal.querySelector('#importAppendBtn').onclick = () => {
                  modal.remove();
                  if (workingTableColumns.length === 0) {
                    workingTableColumns = cols;
                    workingTableRows = rows;
                  } else {
                    for (let c of cols)
                      if (!workingTableColumns.find(x => x.name === c.name)) workingTableColumns
                        .push(c);
                    for (let nr of rows) {
                      const appRow = {};
                      workingTableColumns.forEach(c => {
                        const match = cols.find(x => x.name === c.name);
                        appRow[c.id] = match ? nr[match.id] : "";
                      });
                      workingTableRows.unshift(appRow);
                      rowPriorities.set(0, Date.now());
                    }
                  }
                  reorderRowsByPriority();
                  renderCards();
                  updateBulkDeleteButton();
                  document.getElementById("activeDbLabel").innerHTML =
                    `📝 Appended (${rows.length} rows)`;
                  showToast(`Appended ${rows.length} rows from ${file.name}`, 'success');
                };
              });
          } else {
            if (workingTableColumns.length === 0) {
              workingTableColumns = cols;
              workingTableRows = rows;
            } else {
              for (let c of cols)
                if (!workingTableColumns.find(x => x.name === c.name)) workingTableColumns.push(c);
              for (let nr of rows) {
                const appRow = {};
                workingTableColumns.forEach(c => {
                  const match = cols.find(x => x.name === c.name);
                  appRow[c.id] = match ? nr[match.id] : "";
                });
                workingTableRows.unshift(appRow);
                rowPriorities.set(0, Date.now());
              }
            }
            reorderRowsByPriority();
            renderCards();
            updateBulkDeleteButton();
            document.getElementById("activeDbLabel").innerHTML =
              `📝 Auto-appended (${rows.length} rows)`;
          }
        } catch (err) {
          showToast(`Import error on ${file.name}: ${err.message}`, "error");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ============================================================
    // 12. THEME, LOGOUT, SLEEP, DRAGGABLE
    // ============================================================
    function setTheme(theme) {
      document.body.className = `theme-${theme}`;
      localStorage.setItem('selectedTheme', theme);
    }

    function handleLogout() {
      if (inactivityTimer) clearTimeout(inactivityTimer);
      currentUser = null;
      localStorage.removeItem('currentUser');
      sessionStorage.setItem('wasLoggedIn', 'false');
      document.getElementById('authOverlay').classList.remove('hidden');
      document.getElementById('mainApp').style.display = 'none';
      showToast('Logged out', 'success');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginMessage').innerText = '';
    }

    function handleSleep() {
      if (isSleeping) return;
      isSleeping = true;
      handleLogout();
      showToast('Sleep mode activated. Login to wake.', 'info');
      setTimeout(() => { isSleeping = false; }, 100);
    }

    function makeDraggable(el) {
      let isDragging = false,
        startX, startY, origX, origY;
      const handle = el.querySelector('.drag-handle') || el;
      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.close-dropdown')) return;
        isDragging = true;
        const rect = el.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        origX = rect.left;
        origY = rect.top;
        el.style.position = 'fixed';
        el.style.left = origX + 'px';
        el.style.top = origY + 'px';
        el.style.width = rect.width + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        e.preventDefault();
      });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        el.style.left = (e.clientX - startX) + 'px';
        el.style.top = (e.clientY - startY) + 'px';
      });
      document.addEventListener('mouseup', () => { isDragging = false; });
      const resizeHandle = el.querySelector('.resize-handle');
      if (resizeHandle) {
        let isResizing = false,
          startW, startH, startX2, startY2;
        resizeHandle.addEventListener('mousedown', (e) => {
          isResizing = true;
          const rect = el.getBoundingClientRect();
          startW = rect.width;
          startH = rect.height;
          startX2 = e.clientX;
          startY2 = e.clientY;
          e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
          if (!isResizing) return;
          const newW = Math.max(280, startW + (e.clientX - startX2));
          const newH = Math.max(200, startH + (e.clientY - startY2));
          el.style.width = newW + 'px';
          el.style.height = newH + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; });
      }
    }

    function showSearchColumnDropdown(e) {
      e.preventDefault();
      e.stopPropagation();
      closeAllDropdowns();
      const btn = document.getElementById('searchColumnBtnStats');
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      const card = document.createElement('div');
      card.className = 'floating-dropdown shadow-xl border border-white/15';
      card.style.width = 'auto';
      card.style.minWidth = '200px';
      card.style.top = (rect.bottom + 8) + 'px';
      card.style.left = (rect.left - 200) + 'px';
      if (parseInt(card.style.left) < 10) card.style.left = '10px';
      let colsHtml = '';
      if (workingTableColumns.length === 0) {
        colsHtml = '<div class="text-center text-slate-400 py-4 text-sm font-medium">No columns yet</div>';
      } else {
        colsHtml =
          `<div class="col-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-white/20 transition ${!currentSearchColumn ? 'bg-white/15 text-indigo-700 font-bold' : 'text-slate-700'}" data-col-id=""><span class="text-xs font-black text-slate-300 w-6 flex-shrink-0">—</span><span class="text-sm truncate">All columns</span></div>`;
        workingTableColumns.forEach((col, i) => {
          const isActive = currentSearchColumn === col.id;
          colsHtml +=
            `<div class="col-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-white/20 transition ${isActive ? 'bg-white/15 text-indigo-700 font-bold' : 'text-slate-700'}" data-col-id="${col.id}"><span class="text-xs font-black text-slate-300 w-6 flex-shrink-0">${i + 1}</span><span class="text-sm truncate">${escapeHtml(col.name)}</span></div>`;
        });
      }
      card.innerHTML =
        `<div class="drag-handle flex justify-between items-center mb-2 pb-2 border-b border-white/15"><span class="text-xs font-bold text-slate-500 uppercase tracking-wide"><i class="fas fa-columns mr-1 opacity-50"></i> Search Column</span><span class="close-dropdown" id="closeSearchCol"><i class="fas fa-times"></i></span></div><div class="dropdown-content max-h-[300px] overflow-auto">${colsHtml}</div>`;
      document.body.appendChild(card);
      makeDraggable(card);
      card.querySelector('#closeSearchCol').onclick = () => card.remove();
      card.querySelectorAll('[data-col-id]').forEach(item => {
        item.onclick = () => {
          currentSearchColumn = item.getAttribute('data-col-id');
          updateSearchDropdown();
          renderCards();
          card.remove();
        };
      });
    }

    // ============================================================
    // 13. AUTH
    // ============================================================
    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const msg = document.getElementById('loginMessage');
      if (!username || !password) { msg.innerText = 'Enter credentials'; return; }
      document.getElementById('loadingScreen').classList.remove('hidden');
      updateLoadingProgress(10, 'Authenticating...');
      try {
        const snap = await firebaseDB.ref('users-generatedcode').once('value');
        const users = snap.val();
        let found = null;
        for (let k in users) {
          if (users[k].username === username) {
            found = users[k];
            found.id = k;
            break;
          }
        }
        if (!found) {
          msg.innerText = 'Invalid credentials';
          hideLoadingScreen();
          return;
        }
        let stored = "";
        if (typeof found.password === "string") stored = found.password;
        else if (typeof found.password === "object") stored = found.password.password || found.password
          .value || JSON.stringify(found.password);
        else stored = String(found.password);
        if (String(stored) === String(password)) {
          currentUser = found;
          localStorage.setItem('currentUser', JSON.stringify(found));
          sessionStorage.setItem('wasLoggedIn', 'true');
          msg.innerText = '';
          document.getElementById('loginPassword').value = '';
          updateLoadingProgress(20, 'Loading...');
          await showMainApp();
        } else {
          msg.innerText = 'Invalid password';
          document.getElementById('loginPassword').value = '';
          hideLoadingScreen();
        }
      } catch (e) {
        msg.innerText = 'Server error';
        console.error(e);
        hideLoadingScreen();
      }
    }

    async function showMainApp() {
      try {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('mainApp').style.display = 'block';
        updateLoadingProgress(30, 'Loading data...');
        await loadFromFirebase();

        updateLoadingProgress(70, 'UI...');
        renderCards();
        setupInactivityListeners();

        // 🔥 Load permissions after user is authenticated
        await loadUserPermissions();

        setTimeout(() => {
          updateLoadingProgress(100, 'Ready');
          setTimeout(hideLoadingScreen, 400);
        }, 200);
      } catch (e) {
        console.error(e);
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'none';
        hideLoadingScreen();
        showToast('Error loading app', 'error');
      }
    }

    // ============================================================
    // 14. INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('loadingScreen').classList.remove('hidden');
      updateLoadingProgress(5, 'Firebase...');
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseDB = firebase.database();
        console.log('Firebase initialized');
        updateLoadingProgress(15, 'Firebase connected');
      } catch (e) {
        console.warn('Firebase init error:', e);
        updateLoadingProgress(15, 'Firebase offline mode');
      }
      const savedTheme = localStorage.getItem('selectedTheme') || 'light';
      setTheme(savedTheme);
      updateSearchDropdown();
      updateLoadingProgress(35, 'Session...');
      const saved = localStorage.getItem('currentUser');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          showMainApp();
        } catch (e) {
          document.getElementById('authOverlay').classList.remove('hidden');
          document.getElementById('mainApp').style.display = 'none';
          hideLoadingScreen();
        }
      } else {
        setTimeout(() => {
          document.getElementById('authOverlay').classList.remove('hidden');
          document.getElementById('mainApp').style.display = 'none';
          hideLoadingScreen();
        }, 500);
      }

      // Event Listeners
      document.getElementById('doLoginBtn').onclick = handleLogin;
      document.getElementById('dbActionsBtn').onclick = showDbActionsCard;
      document.getElementById('columnOpsBtn').onclick = showColumnOps;
      document.getElementById('rowOpsBtn').onclick = showRowOpsCard;
      document.getElementById('showStatsBtn').onclick = function (e) {
        const panel = document.getElementById('statsPanel');
        const rect = this.getBoundingClientRect();
        panel.style.top = (rect.bottom + 10) + 'px';
        panel.style.left = (rect.left - 420) + 'px';
        if (parseInt(panel.style.left) < 10) panel.style.left = '10px';
        panel.style.display = 'block';
        if (panel.classList.contains('visible')) {
          panel.classList.remove('visible');
          panel.style.display = 'none';
        } else {
          panel.classList.add('visible');
          panel.style.display = 'block';
          updateStatistics();
          makeDraggable(panel);
        }
      };
      document.getElementById('closeStatsBtn').onclick = function () {
        const panel = document.getElementById('statsPanel');
        panel.classList.remove('visible');
        panel.style.display = 'none';
      };
      document.getElementById('searchColumnBtnStats').onclick = function (e) {
        e.stopPropagation();
        showSearchColumnDropdown(e);
      };
      document.getElementById('smartSearchInputStats').oninput = function () {
        currentSearchTerm = this.value;
        renderCards();
      };
      document.getElementById('clearSearchBtnStats').onclick = function () {
        const inp = document.getElementById('smartSearchInputStats');
        if (inp) inp.value = '';
        currentSearchColumn = '';
        currentSearchTerm = '';
        updateSearchDropdown();
        renderCards();
        showToast('Search cleared', 'info');
      };
      document.getElementById('toggleSelectBtnStats').onclick = function () {
        if (workingTableRows.length === 0) return;
        const allSelected = workingTableRows.every((_, idx) => selectedRows.has(idx));
        if (allSelected) {
          selectedRows.clear();
          showToast('Deselected all', 'info');
        } else {
          workingTableRows.forEach((_, idx) => selectedRows.add(idx));
          showToast(`Selected all ${workingTableRows.length} rows`, 'success');
        }
        renderCards();
        updateBulkDeleteButton();
      };
      document.getElementById('quickAddColumnBtn').onclick = showColumnOps;

      // Settings sub-buttons
      document.getElementById('settingsExportJsonBtn').onclick = exportJSONData;
      document.getElementById('settingsExportExcelBtn').onclick = exportExcel;
      document.getElementById('settingsImportExcel').onchange = function (e) {
        if (this.files.length) {
          for (let i = 0; i < this.files.length; i++) importExcel(this.files[i], i === this.files
            .length - 1);
          this.value = '';
          showToast(`Importing ${this.files.length} files...`, 'success');
        }
      };


      document.getElementById('settingsAddPageBtn').onclick = function () {
        showModal('Redirect to Page',
          `<div class="mb-4">
            <div class="flex gap-2 flex-wrap mt-2">
                <a href="Main_App.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-home"></i> Main Page
                </a>
                <a href="SMART_Help.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-question-circle"></i> Help
                </a>
            </div>
            <div class="border-t border-white/15 my-3"></div>
            <p class="text-xs text-slate-400 mb-3">Or enter a custom URL below to redirect:</p>
          </div>
          <div class="mb-4">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Enter URL</label>
            <input id="settingsPageUrl" placeholder="https://www.google.com" class="input-modern text-sm mt-1">
          </div>
          <div class="flex gap-2 justify-end">
            <button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
            <button class="btn-modern text-sm" id="confirmRedirectBtn"><i class="fas fa-external-link-alt mr-1"></i> Redirect</button>
          </div>`,
          (modal) => {
            modal.querySelector('#confirmRedirectBtn').onclick = () => {
              const url = modal.querySelector('#settingsPageUrl').value.trim();
              if (!url) { showToast('Please enter a URL', 'error'); return; }
              // Check if URL has protocol, if not add https://
              let finalUrl = url;
              if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = 'https://' + url;
              }
              // Open in new tab
              window.open(finalUrl, '_blank');
              modal.remove();
              showToast(`Redirecting to ${finalUrl}`, 'success');
            };
          }
        );
      };


      document.getElementById('settingsSleepBtn').onclick = handleSleep;
      document.getElementById('settingsLogoutBtn').onclick = handleLogout;

      // Theme buttons
      document.querySelectorAll('.theme-option-small').forEach(el => {
        el.onclick = function () {
          const theme = this.getAttribute('data-theme');
          setTheme(theme);
        };
      });
    });

    console.log('✅ Main_App.html loaded successfully');
    console.log('✅ Theme buttons: Light ☀️, Dark 🌙, Ocean 🌊 controlled by theme-option-small');
    console.log('✅ Logout button is ALWAYS visible');
    console.log('✅ All other buttons are controlled by permissions from control.html');
    console.log('✅ No default permissions are created - all controlled by control panel');
  </script>
