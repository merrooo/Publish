<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title> Nexus DB · Firebase Architect</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
  </script>
  <style>
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 0.5rem;
      margin: 0;
      background: linear-gradient(135deg, #e0e7ff, #ede9fe, #fae8ff);
      transition: all 0.3s;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .neo-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
      transition: all 0.2s;
    }

    .neo-card:hover {
      box-shadow: 0 24px 48px -12px rgba(79, 70, 229, 0.15);
    }

    .pill-btn {
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.15s;
      cursor: pointer;
    }

    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: #a5b4fc;
      transform: translateY(-1px);
    }

    .gradient-text {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .data-card {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      transition: all 0.2s;
      overflow: hidden;
    }

    .data-card:hover {
      border-color: rgba(199, 210, 254, 0.6);
      box-shadow: 0 8px 24px -8px rgba(79, 70, 229, 0.1);
    }

    .input-modern {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(226, 232, 240, 0.4);
      border-radius: 16px;
      padding: 0.5rem 1rem;
      transition: 0.15s;
      width: 100%;
    }

    .input-modern:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.6);
    }

    .btn-modern {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.35rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      transition: all 0.25s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn-modern:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .btn-modern.small {
      font-size: 0.65rem;
      padding: 0.25rem 0.75rem;
    }

    .btn-glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 40px;
      padding: 0.35rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      transition: all 0.25s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.45);
      border-color: rgba(165, 180, 252, 0.5);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.15rem 0.6rem;
      font-weight: 600;
      font-size: 0.6rem;
      transition: 0.2s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      transform: scale(1.05);
    }

    .badge-comment {
      background: rgba(238, 242, 255, 0.6);
      backdrop-filter: blur(4px);
      color: #4f46e5;
      border-radius: 40px;
      padding: 0.1rem 0.8rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .priority-dot {
      width: 4px;
      height: 32px;
      background: #f59e0b;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 0 6px 6px 0;
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(199, 210, 254, 0.7);
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(165, 180, 252, 0.9);
    }

    .main-card {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
    }

    #cardsWrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      width: 100%;
      max-height: calc(100vh - 170px);
      min-height: 500px;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .floating-dropdown {
      position: fixed;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.18);
      padding: 1.25rem;
      min-width: 260px;
      max-width: 560px;
      overflow: visible;
      transition: opacity 0.2s;
    }

    .floating-dropdown .drag-handle {
      cursor: grab;
      padding: 0.25rem 0.5rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.03);
      font-size: 0.7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      width: 100%;
    }

    .floating-dropdown .drag-handle:active {
      cursor: grabbing;
    }

    .floating-dropdown .close-dropdown {
      cursor: pointer;
      padding: 0.25rem 0.7rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.12);
      transition: 0.15s;
      font-size: 0.9rem;
      color: #1e293b;
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 28px;
    }

    .floating-dropdown .close-dropdown:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #dc2626;
    }

    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .avatar-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
      text-transform: uppercase;
      overflow: hidden;
      flex-shrink: 0;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .bottom-actions-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .stats-search-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.6rem;
      background: rgba(241, 245, 249, 0.2);
      border-radius: 14px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      margin-bottom: 0.5rem;
    }

    .pill-btn-sm {
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      border-radius: 30px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(226, 232, 240, 0.2);
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }

    .pill-btn-sm:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #a5b4fc;
    }

    .input-sm {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      border: 1.5px solid rgba(226, 232, 240, 0.2);
      background: rgba(255, 255, 255, 0.3);
      transition: 0.15s;
      flex: 1;
      min-width: 60px;
    }

    .input-sm:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.6);
    }

    .col-list-container {
      max-height: 260px;
      overflow-y: auto;
      padding: 0.25rem;
      background: rgba(250, 251, 252, 0.2);
      border-radius: 12px;
      border: 1px solid rgba(238, 242, 246, 0.2);
    }

    .col-list-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      margin-bottom: 2px;
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .col-list-item:hover {
      border-color: rgba(226, 232, 240, 0.4);
      background: rgba(248, 250, 252, 0.3);
    }

    .col-list-item .drag-icon {
      color: #94a3b8;
      font-size: 0.65rem;
      cursor: grab;
      padding: 0.1rem 0.2rem;
    }

    .col-list-item .col-name-input {
      border: none;
      background: transparent;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.1rem 0.3rem;
      flex: 1;
      min-width: 50px;
      color: #1e293b;
    }

    .col-list-item .col-name-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      box-shadow: 0 0 0 2px #818cf8;
    }

    .col-list-item .col-type-badge {
      font-size: 0.55rem;
      text-transform: uppercase;
      font-weight: 700;
      background: rgba(238, 242, 255, 0.4);
      color: #4f46e5;
      padding: 0.05rem 0.4rem;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .col-list-item .remove-col-btn {
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      font-size: 0.65rem;
      transition: 0.15s;
    }

    .col-list-item .remove-col-btn:hover {
      color: #ef4444;
      background: rgba(254, 242, 242, 0.4);
    }

    .image-upload-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .image-upload-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border: 2px dashed rgba(199, 210, 254, 0.4);
      border-radius: 16px;
      background: rgba(248, 250, 255, 0.2);
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .image-upload-area:hover {
      border-color: #818cf8;
      background: rgba(238, 242, 255, 0.2);
    }

    .image-upload-area input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      top: 0;
      left: 0;
    }

    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .image-preview-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.6rem 0.3rem 0.3rem;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      flex-shrink: 0;
    }

    .image-preview-item .image-thumb {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(226, 232, 240, 0.2);
    }

    .image-preview-item .image-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-item .image-filename {
      font-size: 0.6rem;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
    }

    .image-preview-item .image-actions .view-image-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      color: white;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      cursor: pointer;
      transition: 0.15s;
    }

    .image-preview-item .image-actions .view-image-btn:hover {
      background: rgba(0, 0, 0, 0.45);
      transform: scale(1.05);
    }

    .image-preview-item .image-actions .remove-image-btn {
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      background: rgba(239, 68, 68, 0.6);
      color: white;
      border: none;
      font-size: 0.55rem;
      cursor: pointer;
      transition: 0.15s;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .image-preview-item .image-actions .remove-image-btn:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .action-gear-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: #64748b;
      font-size: 0.8rem;
    }

    .action-gear-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      color: #4f46e5;
      transform: rotate(60deg);
    }

    #statsPanel {
      position: fixed;
      z-index: 9999;
      display: none;
      width: 420px;
      max-height: 520px;
    }

    #statsPanel.visible {
      display: block;
    }

    .theme-dark body {
      background: linear-gradient(135deg, #0b1120, #1a1a2e, #16213e);
    }

    .theme-dark .glass-card {
      background: rgba(20, 30, 50, 0.4);
      border-color: rgba(42, 58, 90, 0.4);
    }

    .theme-dark .neo-card {
      background: rgba(18, 27, 46, 0.4);
      border-color: rgba(30, 45, 68, 0.4);
    }

    .theme-dark .data-card {
      background: rgba(20, 31, 51, 0.4);
      border-color: rgba(30, 45, 68, 0.4);
    }

    .theme-dark .input-modern {
      background: rgba(26, 39, 64, 0.4);
      border-color: rgba(42, 58, 90, 0.4);
      color: #e2e8f0;
    }

    .theme-ocean body {
      background: linear-gradient(135deg, #064663, #0a4b6e, #1a7a9e);
    }

    .theme-ocean .glass-card {
      background: rgba(6, 70, 99, 0.5);
      border-color: rgba(56, 189, 248, 0.25);
    }

    .theme-ocean .neo-card {
      background: rgba(10, 75, 110, 0.4);
      border-color: rgba(30, 122, 158, 0.3);
    }

    .theme-ocean .data-card {
      background: rgba(10, 75, 110, 0.4);
      border-color: rgba(30, 122, 158, 0.3);
    }

    .theme-ocean .input-modern {
      background: rgba(13, 79, 117, 0.4);
      border-color: rgba(56, 189, 248, 0.25);
      color: #f0f9ff;
    }

    /* Hidden class for permission control */
    .perm-hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="loadingScreen"
    class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-gradient-to-br from-[#0b1120] to-[#1e293b] transition-opacity duration-700">
    <div class="flex items-center gap-4 text-3xl font-black text-white"><i class="fas fa-bolt text-yellow-400"></i><span
        class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Loading</span></div>
    <div class="mt-6 relative w-20 h-20">
      <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-indigo-400 animate-spin"></div>
      <div
        class="absolute inset-2 rounded-full border-4 border-transparent border-r-purple-400 animate-spin [animation-delay:0.2s]">
      </div>
      <div
        class="absolute inset-4 rounded-full border-4 border-transparent border-b-yellow-400 animate-spin [animation-delay:0.4s]">
      </div>
    </div>
    <div class="w-64 max-w-[80%] h-1 bg-slate-700 rounded-full mt-4 overflow-hidden">
      <div id="loadingProgressBar"
        class="h-full bg-gradient-to-r from-indigo-400 to-purple-400 transition-all duration-500" style="width:0%">
      </div>
    </div>
    <div id="loadingStatus" class="mt-3 text-slate-400 text-xs">Connecting...</div>
  </div>

  <div id="authOverlay"
    class="fixed inset-0 z-[10000] flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700">
    <div class="neo-card w-[420px] max-w-[95%] p-8 text-center">
      <h2 class="text-3xl font-black gradient-text">Welcome back</h2>
      <div id="loginFormDiv" class="mt-6 space-y-4">
        <input id="loginUsername" type="text" placeholder="Username" class="input-modern">
        <input id="loginPassword" type="password" placeholder="Password" class="input-modern">
        <button id="doLoginBtn" class="btn-modern w-full py-3 text-base justify-center">Access</button>
        <div id="loginMessage" class="text-rose-500 text-sm mt-2"></div>
      </div>
    </div>
  </div>

  <div id="mainApp" style="display:none;" class="main-card">
    <div class="glass-card neo-card rounded-[15px] p-4 flex flex-col min-h-[97vh] w-full">
      <div class="top-bar">
        <div class="top-bar-left"><i class="fas fa-bolt text-yellow-500 text-xl"></i>
          <h1 class="text-xl font-black gradient-text">Nexus DB</h1>
        </div>
        <div class="top-bar-right">
          <div id="firebaseStatus" class="btn-glass small"><i class="fas fa-link text-emerald-500"></i><span
              id="firebaseStatusText">● LIVE</span></div>
          <div class="action-buttons">
            <button id="dbActionsBtn" class="btn-modern small"><i class="fas fa-database"></i></button>
            <button id="columnOpsBtn" class="btn-modern small"><i class="fas fa-columns"></i></button>
            <button id="rowOpsBtn" class="btn-modern small"><i class="fas fa-layer-group"></i></button>
            <button id="showStatsBtn" class="btn-modern small"><i class="fas fa-chart-bar"></i></button>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-hidden py-3 min-h-[400px] relative">
        <div id="emptyDataState"
          class="empty-state-glow flex flex-col items-center justify-center h-full text-slate-400">
          <i class="fas fa-table text-5xl opacity-30 mb-3"></i>
          <span class="text-sm font-medium">No structure yet</span>
          <button id="quickAddColumnBtn" class="btn-modern mt-4 text-sm"><i class="fas fa-plus-circle"></i>Add first
            column</button>
        </div>
        <div id="cardsWrapper" class="grid grid-cols-1 gap-3 w-full"></div>
      </div>

      <div class="bottom-actions">
        <div class="bottom-actions-left">
          <span id="activeDbLabel" class="text-xs font-medium text-slate-500"><i
              class="fas fa-info-circle mr-1"></i>Working on unsaved</span>
          <span id="rowCount" class="text-xs bg-white/20 px-3 py-1 rounded-full font-mono text-slate-600">📋 0
            rows</span>
        </div>

    function genColId() { return `col_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`; }

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

    function showToast(msg, type = "info") {
      const d = document.querySelector(".toast-notify");
      if (d) d.remove();
      const div = document.createElement("div");
      div.className =
        `toast-notify ${type === 'success' ? 'bg-emerald-50/60 text-emerald-700 border-l-4 border-emerald-500' : type === 'error' ? 'bg-rose-50/60 text-rose-700 border-l-4 border-rose-500' : 'bg-white/60 text-slate-700 border-l-4 border-indigo-500'}`;

    function closeAllDropdowns() {
      document.querySelectorAll('.floating-dropdown').forEach(m => { if (m.id !== 'statsPanel') m.remove(); });

    function showModal(title, contentHtml, onReady) {

      document.body.appendChild(ov);
      if (onReady) onReady(ov);
    }

    function compressImage(file, maxDim = 600, q = 0.7) {
      return new Promise(r => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement('canvas');
            let w = img.width,
              h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) {
                h = (h * maxDim) / w;
                w = maxDim;
              } else {
                w = (w * maxDim) / h;
                h = maxDim;
              }
            }
            c.width = w;
            c.height = h;
            const ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const b64 = c.toDataURL('image/jpeg', q);
            r({ base64: b64, filename: file.name || 'image' });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function openImageModal(src) {
      Swal.fire({
        imageUrl: src,
        showCloseButton: true,
        showConfirmButton: false,
        width: "auto",
        background: "rgba(0,0,0,0.9)",
        imageWidth: "80%"
      });
    }

    function resetInactivityTimer() {
      if (inactivityTimer) clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        if (currentUser) {
          handleLogout();
          showToast('Logged out due to 10 minutes of inactivity', 'error');
        }
      }, 10 * 60 * 1000);
    }

    function setupInactivityListeners() {
      ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(e => document.addEventListener(e,
        resetInactivityTimer));
      resetInactivityTimer();
    }

    function updateLoadingProgress(p, t) {
      const bar = document.getElementById('loadingProgressBar');
      if (bar) bar.style.width = p + '%';
      const st = document.getElementById('loadingStatus');
      if (st && t) st.textContent = t;
    }

    function hideLoadingScreen() {
      const el = document.getElementById('loadingScreen');
      if (el) el.classList.add('hidden');
    }

    function updateSearchDropdown() {
      const label = document.getElementById('searchColumnLabelStats');
      if (!label) return;
      if (!currentSearchColumn) {
        label.innerHTML = 'All';
      } else {
        const col = workingTableColumns.find(c => c.id === currentSearchColumn);
        label.innerHTML = col ? escapeHtml(col.name) : 'All';
      }
    }

    function formatDate(v, f) {
      if (!v) return '';
      let d;
      if (typeof v === 'string') {
        if (v.includes('/')) {
          const p = v.split('/');
          if (f === 'DD/MM/YYYY') d = new Date(p[2], p[1] - 1, p[0]);
          else if (f === 'MM/DD/YYYY') d = new Date(p[2], p[0] - 1, p[1]);
          else d = new Date(v);
        } else if (v.includes('-')) {
          const p = v.split('-');
          if (f === 'DD-MM-YYYY') d = new Date(p[2], p[1] - 1, p[0]);
          else if (f === 'YYYY-MM-DD') d = new Date(p[0], p[1] - 1, p[2]);
          else d = new Date(v);
        } else d = new Date(v);
      } else d = new Date(v);
      if (isNaN(d.getTime())) return v;
      const day = String(d.getDate()).padStart(2, '0'),
        month = String(d.getMonth() + 1).padStart(2, '0'),
        year = d.getFullYear();
      if (f === 'DD/MM/YYYY') return `${day}/${month}/${year}`;
      if (f === 'MM/DD/YYYY') return `${month}/${day}/${year}`;
      if (f === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
      return v;
    }

    function updateBulkDeleteButton() {
      const c = selectedRows.size;
      const btn = document.getElementById('rowOpsBtn');
      if (btn) {
        let badge = document.getElementById('rowOpsBadge');
        if (c > 0) {
          if (badge) badge.innerText = c;
          else btn.innerHTML +=
            `<span id="rowOpsBadge" class="ml-2 bg-white/20 text-indigo-700 text-[10px] font-bold px-1.5 py-0.5 rounded-md">${c}</span>`;
        } else {
          if (badge) badge.remove();
        }
      }
    }

    function updatePriority(idx) {
      rowPriorities.set(idx, Date.now());
      reorderRowsByPriority();
    }

    function reorderRowsByPriority() {
      const arr = workingTableRows.map((r, i) => ({ row: r, idx: i, priority: rowPriorities.get(i) || 0 }));
      arr.sort((a, b) => b.priority - a.priority);
      const newRows = arr.map(x => x.row);
      const newPriorities = new Map(),
        newComments = new Map(),
        newStarred = new Set(),
        newSelected = new Set();
      arr.forEach((x, newIdx) => {
        const old = x.idx;
        if (rowPriorities.has(old)) newPriorities.set(newIdx, rowPriorities.get(old));
        if (rowComments.has(old)) newComments.set(newIdx, rowComments.get(old));
        if (starredRows.has(old)) newStarred.add(newIdx);
        if (selectedRows.has(old)) newSelected.add(newIdx);
      });
      workingTableRows = newRows;
      rowPriorities = newPriorities;
      rowComments = newComments;
      starredRows = newStarred;
      selectedRows = newSelected;
      updateBulkDeleteButton();
    }

    function updateStatistics() {
      const c = document.getElementById('statsDataContent');
      if (!c) return;
      if (workingTableColumns.length === 0 || workingTableRows.length === 0) {
        c.innerHTML = '<div class="text-center text-slate-400 py-4 text-xs">No data</div>';
        return;
      }
      let html = '';
      for (let col of workingTableColumns) {
        if (col.type === 'number') {
          let sum = 0,
            cnt = 0,
            min = Infinity,
            max = -Infinity;
          workingTableRows.forEach(r => {
            let v = parseFloat(r[col.id]);
            if (!isNaN(v) && v !== null && v !== '') {
              sum += v;
              cnt++;
              if (v < min) min = v;
              if (v > max) max = v;
            }
          });
          if (cnt > 0) {
            html +=
              `<div class="bg-white/15 p-2 rounded-xl text-xs"><span class="font-semibold">${escapeHtml(col.name)}</span><div class="flex flex-wrap gap-2 text-slate-600 mt-0.5"><span>Sum ${sum.toLocaleString()}</span><span>Avg ${(sum / cnt).toFixed(2)}</span><span>Count ${cnt}</span></div></div>`;
          }
        } else if (col.type === 'checkbox') {
          let yes = workingTableRows.filter(r => r[col.id] === true).length;
          html +=
            `<div class="bg-white/15 p-2 rounded-xl text-xs"><span class="font-semibold">${escapeHtml(col.name)}</span><div class="flex gap-2 text-slate-600 mt-0.5"><span>Yes ${yes}</span><span>No ${workingTableRows.length - yes}</span></div></div>`;
        } else {
          let u = new Set(),
            f = 0;
          workingTableRows.forEach(r => {
            let v = r[col.id];
            if (v && v !== '' && !(Array.isArray(v) && v.length === 0)) {
              u.add(String(v));
              f++;
            }
          });
          html +=
            `<div class="bg-white/15 p-2 rounded-xl text-xs"><span class="font-semibold">${escapeHtml(col.name)}</span><div class="flex gap-2 text-slate-600 mt-0.5"><span>Total ${workingTableRows.length}</span><span>Unique ${u.size}</span></div></div>`;
        }
      }
      c.innerHTML = html;
    }

    function getImageUploadHTML(colId, rowIdx, images) {
      const arr = Array.isArray(images) ? images : (images ? [images] : []);
      let html =
        `<div class="image-upload-wrapper"><div class="image-upload-area relative"><i class="fas fa-cloud-upload-alt upload-icon"></i><span class="upload-text">Drop images or click to upload</span><input type="file" accept="image/*" multiple class="image-upload-input absolute inset-0 opacity-0 cursor-pointer" data-row="${rowIdx}" data-col="${colId}"></div><div class="image-preview-grid" id="preview_${colId}_${rowIdx}">`;
      arr.forEach((img, i) => {
        const fn = imageFileNames.get(img) || 'image';
        html +=
          `<div class="image-preview-item"><div class="image-thumb"><img src="${escapeHtml(img)}" alt="${escapeHtml(fn)}"></div><div class="image-info"><span class="image-filename">${escapeHtml(fn)}</span></div><div class="image-actions"><button class="view-image-btn" onclick="window.openImageModal('${escapeHtml(img)}')" title="View full image"><i class="fas fa-search"></i></button><button class="remove-image-btn" data-row="${rowIdx}" data-col="${colId}" data-img-index="${i}" title="Remove image"><i class="fas fa-trash-alt"></i> Remove</button></div></div>`;
      });
      html += `</div></div>`;
      return html;
    }

    // ============================================================
    // 3. WINDOW FUNCTIONS
    // ============================================================
    window.openImageModal = openImageModal;

    window.showFloatingMenu = function (idx, e) {
      e.stopPropagation();
      closeAllDropdowns();
      const menu = document.createElement('div');
      menu.className = 'floating-menu floating-dropdown p-3 min-w-[180px] shadow-xl border border-white/15';
      menu.style.top = (e.clientY + 10) + 'px';
      menu.style.left = (e.clientX - 80) + 'px';
      const isStar = starredRows.has(idx),
        cmt = rowComments.get(idx);
      menu.innerHTML =
        `<div class="drag-handle flex justify-between items-center mb-2 pb-2 border-b border-white/15"><span><i class="fas fa-grip-horizontal mr-1 opacity-50"></i> <span class="text-xs font-bold text-slate-500 uppercase">Actions</span></span><span class="close-dropdown"><i class="fas fa-times"></i></span></div><button class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-white/15 text-slate-700 font-medium transition" onclick="window.startEditRow(${idx});this.closest('.floating-dropdown').remove();"><i class="fas fa-edit mr-2 text-indigo-400"></i>Edit Row</button><button class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-white/15 text-slate-700 font-medium transition" onclick="window.duplicateRow(${idx});this.closest('.floating-dropdown').remove();"><i class="fas fa-copy mr-2 text-sky-400"></i>Duplicate</button><button class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-amber-50/30 text-slate-700 font-medium transition" onclick="window.toggleStarRow(${idx});this.closest('.floating-dropdown').remove();"><i class="fas fa-star mr-2 text-amber-400"></i>${isStar ? 'Unstar' : 'Star'} Row</button><button class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-white/15 text-slate-700 font-medium transition" onclick="window.showCommentModal(${idx});this.closest('.floating-dropdown').remove();"><i class="fas fa-comment-alt mr-2 text-purple-400"></i>${cmt ? 'Edit' : 'Add'} Comment</button><div class="border-t border-white/15 my-1"></div><button class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-rose-50/30 text-rose-600 font-medium transition" onclick="window.deleteRow(${idx});this.closest('.floating-dropdown').remove();"><i class="fas fa-trash-alt mr-2 text-rose-400"></i>Delete Row</button>`;
      document.body.appendChild(menu);
      makeDraggable(menu);
      setTimeout(() => {
        document.addEventListener('click', function close(e) {
          if (!menu.contains(e.target) && !e.target.closest('.floating-dropdown')) {
            menu.remove();
            document.removeEventListener('click', close);
          }
        });
      }, 10);
    };

    window.duplicateRow = function (idx) {
      const src = workingTableRows[idx],
        newRow = {};
      workingTableColumns.forEach(c => { newRow[c.id] = c.type === 'image' ? [...src[c.id] || []] : src[c.id]; });
      workingTableRows.unshift(newRow);
      updatePriority(0);
      renderCards();
      showToast('Row duplicated', 'success');
    };

    window.toggleStarRow = function (idx) {
      if (starredRows.has(idx)) starredRows.delete(idx);
      else starredRows.add(idx);
      updatePriority(idx);
      renderCards();
      showToast(starredRows.has(idx) ? 'Starred' : 'Unstarred', 'info');
    };

    window.showCommentModal = function (idx) {
      const cur = rowComments.get(idx) || '';
      showModal(`Comment on #${idx + 1}`,
        `<textarea id="commentInput" class="input-modern w-full" rows="4" placeholder="Type your comment here...">${escapeHtml(cur)}</textarea><div class="flex gap-2 justify-end mt-4"><button class="pill-btn text-xs bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern text-xs px-5" id="saveCommentBtn">Save Comment</button></div>`,
        (modal) => {
          modal.querySelector('#saveCommentBtn').onclick = () => {
            const v = modal.querySelector('#commentInput').value.trim();
            if (v) rowComments.set(idx, v);
            else rowComments.delete(idx);
            updatePriority(idx);
            renderCards();
            modal.remove();
            showToast(v ? 'Comment saved' : 'Comment removed', 'success');
          };
        });
    };

    window.startEditRow = function (idx) {
      closeAllDropdowns();
      document.querySelector('.floating-menu')?.remove();
      originalRowData = JSON.parse(JSON.stringify(workingTableRows[idx]));
      editingRowIndex = idx;
      renderCards();
      showToast(`Editing row ${idx + 1}`, 'info');
    };

    window.cancelEditRow = function (idx) {
      if (originalRowData) {
        workingTableRows[idx] = originalRowData;
        originalRowData = null;
      }
      editingRowIndex = null;
      renderCards();
      showToast('Edit cancelled', 'info');
    };

    window.saveEditRow = function (idx) {
      editingRowIndex = null;
      originalRowData = null;
      updatePriority(idx);
      renderCards();
      showToast(`Row ${idx + 1} saved`, 'success');
    };

    window.deleteRow = function (idx) {
      showModal('Delete Row',
        `<p class="text-sm text-slate-600 mb-6">Permanently delete row #${idx + 1}?</p><div class="flex gap-3 justify-end"><button class="pill-btn text-xs bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern text-sm px-5" id="deleteConfirmBtn">Delete</button></div>`,
        (modal) => {
          modal.querySelector('#deleteConfirmBtn').onclick = () => {
            modal.remove();
            workingTableRows.splice(idx, 1);
            const ns = new Set(),
              ns2 = new Set(),
              nc = new Map(),
              np = new Map();
            selectedRows.forEach(r => {
              if (r > idx) ns.add(r - 1);
              else if (r < idx) ns.add(r);
            });
            starredRows.forEach(r => {
              if (r > idx) ns2.add(r - 1);
              else if (r < idx) ns2.add(r);
            });
            rowComments.forEach((v, k) => {
              if (k > idx) nc.set(k - 1, v);
              else if (k < idx) nc.set(k, v);
            });
            rowPriorities.forEach((v, k) => {
              if (k > idx) np.set(k - 1, v);
              else if (k < idx) np.set(k, v);
            });
            selectedRows = ns;
            starredRows = ns2;
            rowComments = nc;
            rowPriorities = np;
            if (editingRowIndex !== null && editingRowIndex >= workingTableRows.length) editingRowIndex =
              null;
            renderCards();
            updateBulkDeleteButton();
            showToast('Row deleted', 'success');
          };
        });
    };

    window.updateCellValue = function (idx, colId, val) {
      if (editingRowIndex === idx) {
        const col = workingTableColumns.find(c => c.id === colId);
        if (col && col.type === "number") {
          const n = parseFloat(val);
          workingTableRows[idx][colId] = isNaN(n) ? 0 : n;
        } else {
          workingTableRows[idx][colId] = val;
        }
        updatePriority(idx);
      }
    };

    // ============================================================
    // 4. RENDER CARDS
    // ============================================================
    function renderCards() {
      const empty = document.getElementById("emptyDataState"),
        wrap = document.getElementById("cardsWrapper");
      if (workingTableColumns.length === 0) {
        empty.classList.remove("hidden");
        if (wrap) wrap.classList.add("hidden");
        document.getElementById("rowCount").innerText = "📋 0 rows";
        updateSearchDropdown();
        return;
      }
      empty.classList.add("hidden");
      if (wrap) wrap.classList.remove("hidden");
      if (workingTableRows.length === 0) {
        wrap.innerHTML =
          '<div class="text-center text-slate-400 py-12"><i class="fas fa-inbox text-3xl opacity-30"></i><p class="mt-2">No rows. Click "Row Actions" to add.</p></div>';
        document.getElementById("rowCount").innerText = "📊 0 records";
        updateSearchDropdown();
        return;
      }
      let rows = workingTableRows;
      if (currentSearchColumn && currentSearchTerm) {
        rows = workingTableRows.filter(r => {
          const v = r[currentSearchColumn];
          if (v === undefined || v === null) return false;
          const col = workingTableColumns.find(c => c.id === currentSearchColumn);
          if (!col) return false;
          if (col.type === 'checkbox') {
            const s = currentSearchTerm.toLowerCase();
            if ((s.includes('yes') || s.includes('true') || s.includes('1')) && v === true) return true;
            if ((s.includes('no') || s.includes('false') || s.includes('0')) && v === false) return true;
            return false;
          }
          if (col.type === 'image') {
            if (Array.isArray(v)) return v.some(img => imageFileNames.get(img)?.toLowerCase().includes(
              currentSearchTerm.toLowerCase()));
            if (typeof v === 'string' && v.startsWith('data:image')) return imageFileNames.get(v)
              ?.toLowerCase().includes(currentSearchTerm.toLowerCase());
            return false;
          }
          return String(v).toLowerCase().includes(currentSearchTerm.toLowerCase());
        });
      }
      let html = '';
      for (let idx = 0; idx < rows.length; idx++) {
        const row = rows[idx],
          origIdx = workingTableRows.indexOf(row),
          isEdit = (editingRowIndex === origIdx),
          isSel = selectedRows.has(origIdx),
          isStar = starredRows.has(origIdx),
          cmt = rowComments.get(origIdx),
          hasPrio = rowPriorities.has(origIdx);
        html +=

    function getDbRootPath() { return 'Project_1'; }

    async function loadFromFirebase() {
      if (!firebaseDB || isLoading) return;
      isLoading = true;
      try {
        const snap = await firebaseDB.ref(getDbRootPath()).get();
        savedDatabases = snap.exists() ? snap.val() : {};
        return true;
      } catch (e) {
        console.error('Load error:', e);
        return false;
      } finally {
        isLoading = false;
      }
    }

    function buildDatabaseStructure(dbName, cols, rows) {
      const result = {};
      const processRows = rows.length === 0 ? [{}] : rows;
      processRows.forEach((row, ri) => {
        const key = `row_${ri + 1}`;
        result[key] = {};
        cols.forEach(c => {
          let v = row[c.id];
          if (c.type === 'date' && c.dateFormat && v) v = formatDate(v, c.dateFormat);
          const sanitizedName = c.name.replace(/[.#$\/\[\]]/g, '_');
          result[key][sanitizedName] = {
            type: c.type,
            options: c.options || [],
            dateFormat: c.dateFormat || null,
            value: v !== undefined && v !== null ? v : (c.type === "number" ? 0 : c.type ===
              "checkbox" ? false : c.type === "image" ? [] : "")
          };
          result[key][sanitizedName]['_originalName'] = c.name;
        });
        const idx = ri;
        result[key]['_meta'] = {
          comment: rowComments.get(idx) || '',
          starred: starredRows.has(idx) || false,
          priority: rowPriorities.get(idx) || 0,
          updatedAt: new Date().toISOString()
        };
      });
      return result;
    }

    function parseFirebaseStructure(dbData) {
      if (!dbData) return { columns: [], rows: [], metadata: {} };
      const keys = Object.keys(dbData).filter(k => k.startsWith('row_')).sort();
      if (!keys.length) return { columns: [], rows: [], metadata: {} };
      const first = dbData[keys[0]];
      const colKeys = Object.keys(first).filter(k => k !== '_meta');
      const cols = colKeys.map(sanitizedKey => {
        const colData = first[sanitizedKey];
        const displayName = colData && colData['_originalName'] ? colData['_originalName'] : sanitizedKey;
        return {
          id: genColId(),
          name: displayName,
          type: colData ? colData.type : "text",
          options: colData ? colData.options || [] : [],
          dateFormat: colData ? colData.dateFormat || null : null,
          _sanitizedKey: sanitizedKey
        };
      });
      const rows = [];
      const meta = {};
      keys.forEach((key, idx) => {
        const row = dbData[key];
        const newRow = {};
        cols.forEach(c => {
          const sanitizedKey = c._sanitizedKey;
          newRow[c.id] = row[sanitizedKey] ? row[sanitizedKey].value : (c.type === "number" ? 0 :
            c.type === "checkbox" ? false : c.type === "image" ? [] : "");
        });
        rows.push(newRow);
        if (row['_meta']) {
          meta[idx] = {
            comment: row['_meta'].comment || '',
            starred: row['_meta'].starred || false,
            priority: row['_meta'].priority || 0
          };
        } else {
          meta[idx] = { comment: '', starred: false, priority: 0 };
        }
      });
      return { columns: cols, rows, metadata: meta };
    }

    async function saveToFirebase(dbName, overwrite = false) {
      if (!firebaseDB) { showToast("Firebase not connected", "error"); return false; }
      if (workingTableColumns.length === 0) { showToast("Add columns first", "error"); return false; }
      if (!dbName) { showToast("Database name required", "error"); return false; }
      try {
        const newStructure = buildDatabaseStructure(dbName, workingTableColumns, workingTableRows);
        const newData = {};
        newData[dbName] = newStructure;
        let existingData = {};
        if (!overwrite && savedDatabases[dbName]) existingData = savedDatabases[dbName];
        if (!overwrite && existingData && Object.keys(existingData).length > 0) {
          for (let key in existingData) {
            if (!newData[dbName][key] && key.startsWith('row_')) newData[dbName][key] = existingData[key];
          }
        }
        const otherDbs = {};
        for (let k in savedDatabases)
          if (k !== dbName) otherDbs[k] = savedDatabases[k];
        const merged = { ...otherDbs, ...newData };
        await firebaseDB.ref(getDbRootPath()).set(merged);
        savedDatabases = merged;
        currentLoadedDbName = dbName;
        document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
        showToast(`Saved "${dbName}" with ${workingTableRows.length} rows`, 'success');
        return true;
      } catch (e) {
        console.error('Save error:', e);
        showToast('Save error: ' + e.message, 'error');
        return false;
      }
    }

    async function loadSavedDatabase(dbName) {
      if (!savedDatabases[dbName]) { showToast("Database not found", "error"); return; }
      try {
        const { columns, rows, metadata } = parseFirebaseStructure(savedDatabases[dbName]);
        workingTableColumns = columns;
        workingTableRows = rows;
        editingRowIndex = null;
        currentLoadedDbName = dbName;
        selectedRows.clear();
        starredRows.clear();
        rowComments.clear();
        rowPriorities.clear();
        imageFileNames.clear();
        for (let idx in metadata) {
          const m = metadata[idx];
          if (m.comment) rowComments.set(parseInt(idx), m.comment);
          if (m.starred) starredRows.add(parseInt(idx));
          if (m.priority) rowPriorities.set(parseInt(idx), m.priority);
        }
        workingTableRows.forEach((_, i) => { if (!rowPriorities.has(i)) rowPriorities.set(i, 0); });
        renderCards();
        updateBulkDeleteButton();
        document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
        showToast(`Loaded "${dbName}" (${rows.length} rows)`, 'success');
      } catch (e) {
        console.error('Load error:', e);
        showToast('Error loading database', 'error');
      }
    }

    function setupColumnCardEvents(card) {
      card.querySelectorAll('.col-name-input').forEach(inp => {
        inp.onblur = function () {
          const id = this.getAttribute('data-col-id');
          const col = workingTableColumns.find(c => c.id === id);

          const newName = this.value.trim();
          if (newName && newName !== col.name) {
            col.name = newName;
            renderCards();

          } else if (!newName) {
            this.value = col.name;
          }
        };
        inp.onkeydown = function (e) {
          if (e.key === 'Enter') {
            this.blur();
          }
        };
      });
      card.querySelector('#addColBtn').onclick = function () {
        const name = card.querySelector('#newColName')?.value?.trim();
        const type = card.querySelector('#newColType')?.value;
        if (!name) { showToast("Enter column name", "error"); return; }
        let options = [],
          dateFormat = null;
        if (type === 'date') dateFormat = card.querySelector('#newDateFormat')?.value;
        if (type === 'radio' || type === 'dropdown' || type === 'multi-select') {
          const optVal = card.querySelector('#newColOptions')?.value;
          options = optVal?.split(',').map(x => x.trim()).filter(Boolean) || [];
          if (!options.length) { showToast("Enter options", "error"); return; }
        }
        const col = { id: genColId(), name, type, options, dateFormat };
        workingTableColumns.push(col);
        workingTableRows.forEach(r => {
          if (type === "number") r[col.id] = 0;
          else if (type === "checkbox") r[col.id] = false;
          else if (type === "multi-select") r[col.id] = [];
          else if (type === "image") r[col.id] = [];
          else r[col.id] = "";
        });
        renderCards();
        showToast(`Added "${name}"`, 'success');
        showColumnOps();
      };
      card.querySelectorAll('.remove-col-btn').forEach(btn => {
        btn.onclick = function () {
          const id = this.getAttribute('data-col-id');
          const col = workingTableColumns.find(c => c.id === id);
          if (!col) return;
          showModal('Remove Column',
            `<p class="text-sm text-slate-600 mb-6">Remove column "${escapeHtml(col.name)}"? Data will be lost.</p><div class="flex gap-3 justify-end"><button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern text-sm px-5 bg-rose-500 hover:bg-rose-600" id="confirmRemoveColBtn">Remove</button></div>`,
            (modal) => {
              modal.querySelector('#confirmRemoveColBtn').onclick = () => {
                modal.remove();
                workingTableColumns = workingTableColumns.filter(c => c.id !== id);
                workingTableRows.forEach(r => delete r[id]);
                if (editingRowIndex !== null) editingRowIndex = null;
                renderCards();
                showToast(`Removed "${col.name}"`, 'success');
                showColumnOps();
              };
            });
        };
      });
      const typeSelect = card.querySelector('#newColType');
      if (typeSelect) {
        typeSelect.onchange = function () {
          const type = this.value;
          const optContainer = card.querySelector('#colOptionsContainer');
          const dateContainer = card.querySelector('#dateFormatContainer');
          if (optContainer) optContainer.style.display = (type === 'radio' || type === 'dropdown' ||
            type === 'multi-select') ? 'block' : 'none';
          if (dateContainer) dateContainer.style.display = type === 'date' ? 'block' : 'none';
        };
      }
    }

    function setupColumnDragDrop(card) {
      const container = card.querySelector('#columnListContainer');
      if (!container) return;
      container.addEventListener('dragstart', (e) => {
        const item = e.target.closest('.col-list-item');
        if (!item) return;
        dragSourceIndex = parseInt(item.getAttribute('data-col-index'));
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragSourceIndex);
      });
      container.addEventListener('dragend', (e) => {
        const item = e.target.closest('.col-list-item');
        if (item) item.classList.remove('dragging');
        container.querySelectorAll('.col-list-item').forEach(el => el.classList.remove('drag-over'));
      });
      container.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetItem = e.target.closest('.col-list-item');
        if (targetItem) {
          container.querySelectorAll('.col-list-item').forEach(el => el.classList.remove('drag-over'));
          targetItem.classList.add('drag-over');
        }
      });
      container.addEventListener('dragleave', (e) => {
        const targetItem = e.target.closest('.col-list-item');
        if (targetItem) targetItem.classList.remove('drag-over');
      });
      container.addEventListener('drop', (e) => {
        e.preventDefault();
        const targetItem = e.target.closest('.col-list-item');
        if (!targetItem) return;
        targetItem.classList.remove('drag-over');
        const targetIndex = parseInt(targetItem.getAttribute('data-col-index'));
        if (dragSourceIndex === null || dragSourceIndex === targetIndex) return;
        const [removed] = workingTableColumns.splice(dragSourceIndex, 1);
        workingTableColumns.splice(targetIndex, 0, removed);
        workingTableRows.forEach(row => {
          const newRow = {};
          workingTableColumns.forEach(c => {
            newRow[c.id] = row[c.id] !== undefined ? row[c.id] : (c.type === "number" ? 0 :
              c.type === "checkbox" ? false : c.type === "image" ? [] : "");
          });
          Object.keys(row).forEach(key => delete row[key]);
          Object.assign(row, newRow);
        });
        dragSourceIndex = null;
        renderCards();
        showToast('Columns reordered', 'success');
        showColumnOps();
      });
    }
