<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title> Nexus DB · Firebase Architect</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js">
  </script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
  </script>
  <style>
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 0.5rem;
      margin: 0;
      background: linear-gradient(135deg, #e0e7ff, #ede9fe, #fae8ff);
      transition: all 0.3s;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .neo-card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
      transition: all 0.2s;
    }

    .neo-card:hover {
      box-shadow: 0 24px 48px -12px rgba(79, 70, 229, 0.15);
    }

    .pill-btn {
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.15s;
      cursor: pointer;
    }

    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: #a5b4fc;
      transform: translateY(-1px);
    }

    .gradient-text {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .data-card {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      transition: all 0.2s;
      overflow: hidden;
    }

    .data-card:hover {
      border-color: rgba(199, 210, 254, 0.6);
      box-shadow: 0 8px 24px -8px rgba(79, 70, 229, 0.1);
    }

    .data-card.editing-card {
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .input-modern {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(226, 232, 240, 0.4);
      border-radius: 16px;
      padding: 0.5rem 1rem;
      transition: 0.15s;
      width: 100%;
    }

    .input-modern:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      outline: none;
      background: rgba(255, 255, 255, 0.6);
    }

    .btn-modern {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.35rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn-modern::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .btn-modern:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .btn-modern.small {
      font-size: 0.65rem;
      padding: 0.25rem 0.75rem;
      gap: 0.25rem;
    }

    .btn-modern.btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626, #b91c1c) !important;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4) !important;
    }

    .btn-modern.btn-danger:hover {
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5) !important;
      transform: translateY(-2px) scale(1.02);
    }

    .btn-modern.btn-danger::before {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent);
    }

    .btn-glass {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 40px;
      padding: 0.35rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      transition: all 0.25s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.45);
      border-color: rgba(165, 180, 252, 0.5);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .badge-comment {
      background: rgba(238, 242, 255, 0.6);
      backdrop-filter: blur(4px);
      color: #4f46e5;
      border-radius: 40px;
      padding: 0.1rem 0.8rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .priority-dot {
      width: 4px;
      height: 32px;
      background: #f59e0b;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 0 6px 6px 0;
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(199, 210, 254, 0.7);
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(165, 180, 252, 0.9);
    }

    #cardsWrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      width: 100%;
      max-height: calc(100vh - 170px);
      min-height: 500px;
      overflow-y: auto;
      padding: 0.5rem 0.5rem 1rem 0.5rem;
    }

    .data-card {
      width: 100%;
      margin: 0;
    }

    .data-card .grid {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .theme-dark body {
      background: linear-gradient(135deg, #0b1120, #1a1a2e, #16213e);
    }

    .theme-dark .glass-card {
      background: rgba(20, 30, 50, 0.4);
      border-color: rgba(42, 58, 90, 0.4);
    }

    .theme-dark .neo-card {
      background: rgba(18, 27, 46, 0.4);
      border-color: rgba(30, 45, 68, 0.4);
    }

    .theme-dark .data-card {
      background: rgba(20, 31, 51, 0.4);
      border-color: rgba(30, 45, 68, 0.4);
    }

    .theme-dark .input-modern {
      background: rgba(26, 39, 64, 0.4);
      border-color: rgba(42, 58, 90, 0.4);
      color: #e2e8f0;
    }

    .theme-ocean body {
      background: linear-gradient(135deg, #064663, #0a4b6e, #1a7a9e);
    }

    .theme-ocean .glass-card {
      background: rgba(6, 70, 99, 0.5);
      border-color: rgba(56, 189, 248, 0.25);
    }

    .theme-ocean .neo-card {
      background: rgba(10, 75, 110, 0.4);
      border-color: rgba(30, 122, 158, 0.3);
    }

    .theme-ocean .data-card {
      background: rgba(10, 75, 110, 0.4);
      border-color: rgba(30, 122, 158, 0.3);
    }

    .theme-ocean .input-modern {
      background: rgba(13, 79, 117, 0.4);
      border-color: rgba(56, 189, 248, 0.25);
      color: #f0f9ff;
    }

    .floating-dropdown {
      position: fixed;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.18);
      padding: 1.25rem;
      min-width: 260px;
      max-width: 850px;
      width: auto;
      overflow: visible;
      transition: opacity 0.2s ease;
      max-height: 92vh;
      overflow-y: auto;
    }

    .floating-dropdown .drag-handle {
      cursor: grab;
      padding: 0.25rem 0.5rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.03);
      font-size: 0.7rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      user-select: none;
      width: 100%;
    }

    .floating-dropdown .drag-handle:active {
      cursor: grabbing;
    }

    .floating-dropdown .close-dropdown {
      cursor: pointer;
      padding: 0.25rem 0.7rem;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.12);
      transition: 0.15s;
      font-size: 0.9rem;
      color: #1e293b;
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 28px;
    }

    .floating-dropdown .close-dropdown:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #dc2626;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .theme-dark .floating-dropdown .close-dropdown {
      background: rgba(255, 255, 255, 0.15);
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .theme-dark .floating-dropdown .close-dropdown:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .theme-ocean .floating-dropdown .close-dropdown {
      background: rgba(255, 255, 255, 0.12);
      color: #bae6fd;
      border-color: rgba(56, 189, 248, 0.2);
    }

    .theme-ocean .floating-dropdown .close-dropdown:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .floating-dropdown .dropdown-content {
      max-height: 550px;
      overflow: auto;
    }

    .floating-dropdown .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.04) 50%);
      border-radius: 0 0 28px 0;
    }

    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .avatar-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
      text-transform: uppercase;
      background-size: cover;
      background-position: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .bottom-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-top: 0.75rem;
    }

    .bottom-actions-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .excel-tool-content {
      max-height: 78vh;
      overflow-y: auto;
      padding: 0.25rem;
    }

    .excel-tool-content .compact-select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.6);
    }

    .excel-tool-content .compact-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.6);
    }

    .excel-tool-content .small-btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      transition: 0.2s;
    }

    .excel-tool-content .small-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    .excel-tool-content .small-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .excel-tool-content .small-btn-success {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      transition: 0.2s;
    }

    .excel-tool-content .small-btn-success:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    .excel-tool-content .small-btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
      transition: 0.2s;
    }

    .excel-tool-content .small-btn-danger:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .excel-tool-content .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 4px;
      max-height: 180px;
      overflow-y: auto;
      padding: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(226, 232, 240, 0.2);
    }

    .excel-tool-content .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
    }

    .excel-tool-content .checkbox-item:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .excel-tool-content .checkbox-item input {
      cursor: pointer;
    }

    .excel-tool-content .feature-label {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 4px;
      display: block;
    }

    .excel-tool-content .log-section {
      background: #1e293b;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      margin-top: 8px;
      max-height: 80px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
    }

    .excel-tool-content .log-entry {
      margin-bottom: 2px;
    }

    .excel-tool-content .log-success {
      color: #4ade80;
    }

    .excel-tool-content .log-error {
      color: #f87171;
    }

    .excel-tool-content .log-info {
      color: #60a5fa;
    }

    .excel-tool-content .log-warning {
      color: #fbbf24;
    }

    .excel-tool-content .progress-bar {
      background: #e2e8f0;
      border-radius: 10px;
      height: 6px;
      overflow: hidden;
      margin-top: 8px;
    }

    .excel-tool-content .progress-fill {
      background: #6366f1;
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }

    .excel-tool-content .selection-utils {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .excel-tool-content .text-btn {
      background: none;
      border: none;
      color: #6366f1;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
    }

    .excel-tool-content .text-btn:hover {
      text-decoration: underline;
    }

    .excel-tool-content .list-card {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(226, 232, 240, 0.2);
      border-radius: 8px;
      max-height: 150px;
      overflow-y: auto;
      padding: 4px;
      margin-bottom: 8px;
    }

    .excel-tool-content .converted-col {
      background-color: #d1fae5;
      font-weight: 600;
    }

    .excel-tool-content .date-preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 8px;
    }

    .excel-tool-content .date-preview-table th {
      background: #f1f5f9;
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
    }

    .excel-tool-content .date-preview-table td {
      padding: 4px 8px;
      border-bottom: 1px solid #e2e8f0;
    }

    .excel-tool-content .date-preview-table tr:hover {
      background: #f8fafc;
    }

    .excel-tool-content .table-wrapper {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-top: 8px;
    }

    .excel-tool-content .unique-value-tag {
      display: inline-block;
      background: #e2e8f0;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 10px;
      margin: 2px;
      cursor: pointer;
      transition: 0.15s;
    }

    .excel-tool-content .unique-value-tag:hover {
      background: #818cf8;
      color: white;
    }

    .excel-tool-content .unique-value-tag .count-badge {
      background: #94a3b8;
      color: white;
      border-radius: 50%;
      padding: 0 6px;
      font-size: 8px;
      margin-left: 4px;
    }

    .modal-overlay .neo-card .absolute {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 50%;
      transition: 0.15s;
    }

    .modal-overlay .neo-card .absolute:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .action-gear-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: #64748b;
      font-size: 14px;
    }

    .action-gear-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: rotate(90deg);
      color: #4f46e5;
    }

    .load-more-btn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 600;
      color: #4f46e5;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }

    .load-more-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.15);
    }

    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .import-progress-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .import-progress-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      border-radius: 28px;

  <script>
    // ===== CORE =====
    const FIREBASE_CONFIG = {

    };

    const INACTIVITY_TIMEOUT = 10 * 60 * 1000;
    let firebaseDB, currentUser, isLoading = false, inactivityTimer, isSleeping = false;
    let workingTableColumns = [], workingTableRows = [], savedDatabases = {}, currentLoadedDbName = null, editingRowIndex = null, originalRowData = null;
    let selectedRows = new Set(), starredRows = new Set(), rowComments = new Map(), rowPriorities = new Map(), savedPages = [], imageFileNames = new Map();
    let dragSourceIndex = null;
    let excelData = [];
    let excelHeaders = [];
    let excelOriginalBackup = [];
    let isExcelMode = false;
    let renderedRowCount = 0;
    const ROWS_PER_PAGE = 50;
    let isLoadingMore = false;
    let convertedColumns = new Set();

    // ===== HELPER FUNCTIONS =====
    function genColId() { return `col_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`; }

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

    function sanitizeKey(key) {
      if (!key) return 'unnamed';
      return String(key).replace(/[.#$\/\[\]]/g, '_');
    }

    function showToast(msg, type = "info") {
      const d = document.querySelector(".toast-notify");
      if (d) d.remove();
      const div = document.createElement("div");
      div.className =
        `toast-notify ${type === 'success' ? 'bg-emerald-50/60 text-emerald-700 border-l-4 border-emerald-500' : type === 'error' ? 'bg-rose-50/60 text-rose-700 border-l-4 border-rose-500' : 'bg-white/60 text-slate-700 border-l-4 border-indigo-500'}`;
      div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-circle-info'} mr-2"></i>${msg}`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.floating-dropdown').forEach(m => {
        m.remove();
      });
      document.querySelector('.floating-menu')?.remove();
    }

    function showModal(title, contentHtml, onReady) {
      closeAllDropdowns();
      const ov = document.createElement('div');
      ov.className = 'modal-overlay fixed inset-0 bg-black/25 backdrop-blur-sm flex items-center justify-center z-[999]';
      ov.innerHTML = `<div class="neo-card p-6 w-full max-w-md relative max-h-[90vh] flex flex-col shadow-2xl shadow-indigo-900/15">
        <button class="absolute top-4 right-4 text-slate-600 hover:text-rose-600 transition-colors w-8 h-8 rounded-full hover:bg-rose-50/40 flex items-center justify-center bg-black/5" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
        <h3 class="font-black text-xl mb-5 text-slate-800">${title}</h3>
        <div class="overflow-y-auto flex-1 pr-2 pb-2 custom-scrollbar">${contentHtml}</div>
      </div>`;
      document.body.appendChild(ov);
      if (onReady) onReady(ov);
    }

    function compressImage(file, maxDim = 600, q = 0.7) {
      return new Promise(r => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement('canvas');
            let w = img.width,
              h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) {
                h = (h * maxDim) / w;
                w = maxDim;
              } else {
                w = (w * maxDim) / h;
                h = maxDim;
              }
            }
            c.width = w;
            c.height = h;
            const ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const b64 = c.toDataURL('image/jpeg', q);
            r({ base64: b64, filename: file.name || 'image' });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function openImageModal(src) {
      Swal.fire({
        imageUrl: src, showCloseButton: true,
        showConfirmButton: false, width: "auto", background: "rgba(0,0,0,0.9)",
        imageWidth: "80%"
      });
    }

    function resetInactivityTimer() {
      if (inactivityTimer) clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        if (currentUser) {
          handleLogout();
          showToast('Logged out due to 10 minutes of inactivity', 'error');
        }
      },
        INACTIVITY_TIMEOUT);
    }

    function setupInactivityListeners() {
      ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart',
        'click'
      ].forEach(e => document.addEventListener(e, resetInactivityTimer));
      resetInactivityTimer();
    }

    function startFirebaseConnectionMonitor() {
      if (!firebaseDB) return;
      setInterval(() => {
        firebaseDB.ref('.info/connected').once('value', s => {
          const st =
            document.getElementById('firebaseStatusText');
          if (st) st.innerHTML = s.val() ? '● LIVE' : '● OFFLINE';
        });
      }, 3000);
    }

    function updateLoadingProgress(p, t) {
      const bar = document.getElementById('loadingProgressBar'); if (
        bar) bar.style.width = p + '%'; const st = document.getElementById('loadingStatus'); if (st &&
          t) st.textContent = t;
    }

    function hideLoadingScreen() {
      const el = document.getElementById('loadingScreen'); if (el) el.classList
        .add('hidden');
    }

    // ===== GET CURRENT DATA SOURCE =====
    function getCurrentDataSource() {
      const hasExcelData = excelData.length > 0 && excelHeaders.length > 0;
      const hasDbData = workingTableRows.length > 0 && workingTableColumns.length > 0;

      if (hasExcelData) {
        return {
          data: excelData,
          headers: excelHeaders,
          type: 'excel',
          getValue: function (row, col) { return row[col]; },
          setValue: function (row, col, val) { row[col] = val; },
          getData: function () { return this.data; },
          setData: function (newData) {
            this.data.length = 0;
            this.data.push(...newData);
          }
        };
      } else if (hasDbData) {
        const columnMap = {};
        workingTableColumns.forEach(c => { columnMap[c.name] = c.id; });
        return {
          data: workingTableRows,
          headers: workingTableColumns.map(c => c.name),
          type: 'database',
          columnMap: columnMap,
          columns: workingTableColumns,
          getValue: function (row, col) {
            const id = this.columnMap[col];
            return id !== undefined ? row[id] : undefined;
          },
          setValue: function (row, col, val) {
            const id = this.columnMap[col];
            if (id !== undefined) row[id] = val;
          },
          getData: function () { return this.data; },
          setData: function (newData) {
            this.data.length = 0;
            newData.forEach((row) => {
              const dbRow = {};
              this.columns.forEach(col => {
                dbRow[col.id] = row[col.name] !== undefined ? row[col.name] : (col.type ===
                  "number" ? 0 : "");
              });
              this.data.push(dbRow);
            });
          }
        };
      }
      return null;
    }

    function convertToExcelFormat(source) {
      if (source.type === 'excel') return source.data;
      return source.data.map(row => {
        const newRow = {};
        source.headers.forEach(col => {
          newRow[col] = source.getValue(row, col);
        });
        return newRow;
      });
    }

    function syncBackFromExcel(source, excelDataArray) {
      if (source.type === 'excel') {
        source.setData(excelDataArray);
        return;
      }
      source.data.length = 0;
      excelDataArray.forEach((row) => {
        const dbRow = {};
        source.columns.forEach(col => {
          dbRow[col.id] = row[col.name] !== undefined ? row[col.name] : (col.type === "number" ? 0 :
            "");
        });
        source.data.push(dbRow);
      });
    }

    // ===== GET IMAGE UPLOAD HTML =====
    function getImageUploadHTML(colId, rowIdx, currentImages) {
      const arr = Array.isArray(currentImages) ? currentImages : (currentImages ? [currentImages] : []);
      let html = `<div class="flex flex-wrap gap-1 mt-1">`;
      arr.forEach((img, i) => {
        const fn = imageFileNames.get(img) || 'image';
        html +=
          `<div class="relative w-12 h-12 rounded-lg overflow-hidden border border-white/30 shadow-sm"><img src="${escapeHtml(img)}" class="w-full h-full object-cover"><button class="absolute top-0 right-0 bg-black/50 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hover:bg-red-500 transition" onclick="window.removeImage(${rowIdx},'${colId}',${i})"><i class="fas fa-times"></i></button></div>`;
      });
      html +=
        `<label class="w-12 h-12 rounded-lg border-2 border-dashed border-white/30 flex items-center justify-center cursor-pointer hover:bg-white/10 transition"><i class="fas fa-camera text-slate-400 text-sm"></i><input type="file" accept="image/*" class="hidden" multiple onchange="window.uploadImages(${rowIdx},'${colId}',this)"></label></div>`;
      return html;
    }

    // ===== RENDER CARDS =====
    function renderCards(resetPagination = true) {
      const empty = document.getElementById("emptyDataState"),
        wrap = document.getElementById("cardsWrapper");

      // Check for Excel data
      if (excelData && excelData.length > 0 && excelHeaders && excelHeaders.length > 0) {
        empty.classList.add("hidden");
        wrap.classList.remove("hidden");
        document.getElementById('activeDbLabel').innerHTML = `📊 Excel Mode (${excelData.length} rows)`;
        document.getElementById('rowCount').innerText = `📊 ${excelData.length} records`;

        if (resetPagination) {
          renderedRowCount = 0;
        }

        const totalRows = excelData.length;
        const endIndex = Math.min(renderedRowCount + ROWS_PER_PAGE, totalRows);

        let html = '';

        for (let idx = renderedRowCount; idx < endIndex; idx++) {
          const row = excelData[idx];
          const isStar = starredRows.has(idx);
          const cmt = rowComments.get(idx);
          const hasPrio = rowPriorities.has(idx);

          html += `<div class="data-card p-4 relative" data-row-idx="${idx}">${hasPrio ? '<div class="priority-dot"></div>' : ''}
            <div class="flex items-start gap-3">
              <input type="checkbox" class="row-checkbox mt-1.5 w-4 h-4 text-indigo-600 rounded" data-row="${idx}" ${selectedRows.has(idx) ? 'checked' : ''}>
              <div class="flex-1">
                <div class="flex flex-wrap items-center justify-between gap-1">
                  <div class="flex items-center gap-2 text-sm font-medium">
                    #${idx + 1}${isStar ? ' <i class="fas fa-star text-amber-400"></i>' : ''}
                    ${cmt ? `<span class="badge-comment cursor-pointer" onclick="window.showCommentModal(${idx})"><i class="fas fa-comment mr-1"></i>${cmt.length > 18 ? cmt.substring(0, 18) + '…' : cmt}</span>` : ''}
                  </div>
                  <button class="action-gear-btn" onclick="window.showFloatingMenu(${idx}, event)" title="Row actions">
                    <i class="fas fa-cog"></i>
                  </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mt-3">`;

          for (let col of excelHeaders) {
            let raw = row[col] !== undefined && row[col] !== null ? row[col] : "";
            const label =
              `<span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">${escapeHtml(col)}</span>`;
            let display = (raw === "" || raw === undefined || (Array.isArray(raw) && raw.length ===
              0)) ? "—" : raw;
            html +=
              `<div class="flex flex-col">${label}<div class="text-sm break-words text-slate-700 font-medium">${escapeHtml(String(display))}</div></div>`;
          }
          html += `</div></div></div></div>`;
        }

        if (endIndex < totalRows) {
          html += `<div class="flex justify-center py-4">
            <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreRows()">
              <i class="fas fa-chevron-down mr-2"></i> Load More Rows (${totalRows - endIndex} remaining)
            </button>
          </div>`;
        } else if (renderedRowCount > 0) {
          html += `<div class="flex justify-center py-4">
            <button id="showLessBtn" class="load-more-btn" onclick="showLessRows()">
              <i class="fas fa-chevron-up mr-2"></i> Show Less
            </button>
          </div>`;
        }

        wrap.innerHTML = html;
        document.getElementById('dataInfo').textContent = `Showing ${endIndex} of ${totalRows}`;
        updateBulkDeleteButton();
        return;
      }

      // Fallback to workingTableRows (Database data)
      if (workingTableColumns.length === 0) {
        empty.classList.remove("hidden");
        if (wrap) wrap.classList.add("hidden");
        document.getElementById("rowCount").innerText = "📋 0 rows";
        updateBulkDeleteButton();
        return;
      }

      empty.classList.add("hidden");
      wrap.classList.remove("hidden");

      if (workingTableRows.length === 0) {
        wrap.innerHTML =
          '<div class="text-center text-slate-400 py-12"><i class="fas fa-inbox text-3xl opacity-30"></i><p class="mt-2">No rows. Click "Row Actions" to add.</p></div>';
        document.getElementById("rowCount").innerText = "📊 0 records";
        updateBulkDeleteButton();
        return;
      }

      let rows = workingTableRows;
      let html = '';
      for (let idx = 0; idx < rows.length; idx++) {
        const row = rows[idx],
          origIdx = workingTableRows.indexOf(row),
          isEdit = (editingRowIndex === origIdx),
          isSel = selectedRows.has(origIdx),
          isStar = starredRows.has(origIdx),
          cmt = rowComments.get(origIdx),
          hasPrio = rowPriorities.has(origIdx);

    window.startEditRow = function (idx) {
      const source = getCurrentDataSource();
      if (!source) { showToast("No data to edit", "error"); return; }

      // For both Excel and Database, use a modal with editable fields
      const row = source.data[idx];
      let formHtml = '';
      source.headers.forEach(col => {
        const val = source.getValue(row, col);
        const displayVal = (val !== undefined && val !== null) ? val : '';
        formHtml += `
          <div class="mb-3">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">${escapeHtml(col)}</label>
            <input type="text" class="input-modern text-sm edit-field" data-col="${escapeHtml(col)}" value="${escapeHtml(String(displayVal))}">
          </div>
        `;
      });

      showModal(`Edit Row #${idx + 1}`, `
        <div class="max-h-[60vh] overflow-y-auto">
          ${formHtml}
        </div>
        <div class="flex gap-2 justify-end mt-4">
          <button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn-modern text-sm" id="saveEditRowBtn">Save Changes</button>
        </div>
      `, (modal) => {
        modal.querySelector('#saveEditRowBtn').onclick = () => {
          const fields = modal.querySelectorAll('.edit-field');
          fields.forEach(field => {
            const col = field.getAttribute('data-col');
            const val = field.value;
            const numVal = parseFloat(val);
            // Try to preserve type
            if (!isNaN(numVal) && String(numVal) === val.trim()) {
              source.setValue(row, col, numVal);
            } else if (val === 'true' || val === 'false') {
              source.setValue(row, col, val === 'true');
            } else {
              source.setValue(row, col, val);
            }
          });
          modal.remove();
          renderCards(false);
          showToast(`Row ${idx + 1} updated successfully`, 'success');
        };
      });
    };

    window.duplicateRow = function (idx) {
      const source = getCurrentDataSource();
      if (!source) { showToast("No data", "error"); return; }
      const src = source.data[idx];
      if (!src) return;
      const newRow = {};
      source.headers.forEach(h => { newRow[h] = source.getValue(src, h); });
      source.data.splice(idx + 1, 0, newRow);
      renderCards(true);
      showToast('Row duplicated', 'success');
    };

    window.deleteRow = function (idx) {
      showModal('Delete Row',
        `<p class="text-sm text-slate-600 mb-6">Permanently delete row #${idx + 1}?</p>
        <div class="flex gap-3 justify-end">
          <button class="pill-btn text-xs bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn-modern text-sm px-5" id="deleteConfirmBtn">Delete</button>

        (modal) => {
          modal.querySelector('#deleteConfirmBtn').onclick = () => {
            modal.remove();
            const source = getCurrentDataSource();
            if (source) {
              source.data.splice(idx, 1);
            }
            const ns = new Set(),
              ns2 = new Set(),
              nc = new Map(),
              np = new Map();
            selectedRows.forEach(r => {
              if (r > idx) ns.add(r - 1);
              else if (r < idx) ns.add(r);
            });
            starredRows.forEach(r => {
              if (r > idx) ns2.add(r - 1);
              else if (r < idx) ns2.add(r);
            });
            rowComments.forEach((v, k) => {
              if (k > idx) nc.set(k - 1, v);
              else if (k < idx) nc.set(k, v);
            });
            rowPriorities.forEach((v, k) => {
              if (k > idx) np.set(k - 1, v);
              else if (k < idx) np.set(k, v);
            });
            selectedRows = ns;
            starredRows = ns2;
            rowComments = nc;
            rowPriorities = np;
            renderCards(true);
            updateBulkDeleteButton();
            showToast('Row deleted', 'success');
          };
        }
      );

    window.updateCellValue = function (idx, colId, val) {
      if (editingRowIndex === idx) {
        const col = workingTableColumns.find(c => c.id === colId);
        if (col && col.type === "number") {
          const n = parseFloat(val);
          workingTableRows[idx][colId] = isNaN(n) ? 0 : n;
        } else {
          workingTableRows[idx][colId] = val;
        }
        updatePriority(idx);
      }

        workingTableRows[idx] = originalRowData;

    window.uploadImages = async function (rowIdx, colId, input) {
      if (!input.files.length) return;
      const files = Array.from(input.files);
      const source = getCurrentDataSource();
      if (!source) return;
      for (let file of files) {
        try {
          const result = await compressImage(file);
          const row = source.data[rowIdx];
          if (!row[colId]) row[colId] = [];
          row[colId].push(result.base64);
          imageFileNames.set(result.base64, result.filename);
        } catch (e) { showToast('Error uploading image', 'error'); }
      }
      input.value = '';
      renderCards(false);
      showToast(`${files.length} image(s) uploaded`, 'success');
    };

    window.removeImage = function (rowIdx, colId, imgIdx) {
      const source = getCurrentDataSource();
      if (!source) return;
      const row = source.data[rowIdx];
      if (row && row[colId] && Array.isArray(row[colId])) {
        const removed = row[colId].splice(imgIdx, 1)[0];
        imageFileNames.delete(removed);
        renderCards(false);
        showToast('Image removed', 'info');
      }

    function updatePriority(idx) {
      rowPriorities.set(idx, Date.now());
      reorderRowsByPriority();
    }

    function reorderRowsByPriority() {
      if (workingTableRows.length === 0) return;
      const arr = workingTableRows.map((r, i) => ({
        row: r, idx: i, priority: rowPriorities.get(i) ||
          0
      }));
      arr.sort((a, b) => b.priority - a.priority);
      const newRows = arr.map(x => x.row);
      const newPriorities = new Map(),
        newComments = new Map(),
        newStarred = new Set(),
        newSelected = new Set();
      arr.forEach((x, newIdx) => {
        const old = x.idx;
        if (rowPriorities.has(old)) newPriorities.set(newIdx, rowPriorities.get(old));
        if (rowComments.has(old)) newComments.set(newIdx, rowComments.get(old));
        if (starredRows.has(old)) newStarred.add(newIdx);
        if (selectedRows.has(old)) newSelected.add(newIdx);
      });
      workingTableRows = newRows;
      rowPriorities = newPriorities;
      rowComments = newComments;
      starredRows = newStarred;
      selectedRows = newSelected;
      updateBulkDeleteButton();
    }

    function updateBulkDeleteButton() {
      const c = selectedRows.size;
    }

    function makeDraggable(el) {
      let isDragging = false,
        startX, startY, origX, origY;
      const handle = el.querySelector('.drag-handle') || el;
      handle.addEventListener('mousedown', (e) => {
        if (e.target.closest('.close-dropdown')) return;
        isDragging = true;
        const rect = el.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        origX = rect.left;
        origY = rect.top;
        el.style.position = 'fixed';
        el.style.left = origX + 'px';
        el.style.top = origY + 'px';
        el.style.width = rect.width + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        e.preventDefault();
      });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        el.style.left = (e.clientX - startX) + 'px';
        el.style.top = (e.clientY - startY) + 'px';
      });
      document.addEventListener('mouseup', () => { isDragging = false; });
    }

    // ===== IMPORT EXCEL THROUGH SETTINGS =====
    async function importExcelThroughSettings(file) {
      if (!file) return;

      const overlay = document.createElement('div');
      overlay.className = 'import-progress-overlay';
      overlay.id = 'importProgressOverlay';
      overlay.innerHTML = `
        <div class="import-progress-card">
          <h3 class="font-bold text-lg text-slate-800">Importing Excel...</h3>
          <p id="importProgressText" class="text-sm text-slate-500 mt-2">Processing file: ${file.name}</p>
          <div class="import-progress-bar">
            <div id="importProgressFill" class="import-progress-fill" style="width: 0%"></div>
          </div>
          <p id="importStatusText" class="text-xs text-slate-400 mt-2">Reading data...</p>
        </div>
      `;
      document.body.appendChild(overlay);

      try {
        const reader = new FileReader();
        reader.onload = async function (e) {
          try {
            const data = new Uint8Array(e.target.result);
            document.getElementById('importStatusText').textContent = 'Parsing Excel file...';
            document.getElementById('importProgressFill').style.width = '30%';

            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            document.getElementById('importStatusText').textContent = 'Converting to JSON...';
            document.getElementById('importProgressFill').style.width = '50%';

            const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });
            document.getElementById('importStatusText').textContent =
              `Processing ${jsonData.length} rows...`;
            document.getElementById('importProgressFill').style.width = '70%';

            if (!jsonData.length) throw new Error("Empty file");

            await new Promise(resolve => {
              setTimeout(() => {
                const headers = Object.keys(jsonData[0]);
                excelHeaders = headers;
                excelData = jsonData;
                excelOriginalBackup = jsonData.map(r => ({ ...r }));
                isExcelMode = true;
                renderedRowCount = 0;
                selectedRows.clear();
                starredRows.clear();
                rowComments.clear();
                rowPriorities.clear();
                // Clear database data
                workingTableRows = [];
                workingTableColumns = [];

                document.getElementById('importStatusText').textContent =
                  `Loaded ${excelData.length} rows, ${excelHeaders.length} columns`;
                document.getElementById('importProgressFill').style.width = '100%';

                setTimeout(() => {
                  overlay.remove();
                  renderCards(true);
                  showToast(
                    `Successfully imported ${excelData.length} rows from ${file.name}`,
                    'success');
                }, 500);

                resolve();
              }, 100);
            });
          } catch (err) {
            overlay.remove();
            showToast("Error importing file: " + err.message, "error");
          }
        };
        reader.readAsArrayBuffer(file);
      } catch (err) {
        overlay.remove();
        showToast("Error: " + err.message, "error");
      }
    }

    // Helper to apply operation to current data
    function applyToCurrentData(operation, title) {
      const source = getCurrentDataSource();
      if (!source) { showToast("No data loaded", "error"); return; }

      let tempData = source.type === 'database' ? convertToExcelFormat(source) : source.data;
      let tempHeaders = [...source.headers];

      // Call the operation with tempData and tempHeaders
      const result = operation(tempData, tempHeaders);

      if (result) {
        if (source.type === 'database') {
          syncBackFromExcel(source, tempData);
        }
        renderCards(false);
        showToast(title + ' completed successfully', 'success');
      }
    }

    function initExcelDateConverter(card, source, tempData, tempHeaders) {
      let dateLog = card.querySelector('#dateLog');

      function addDateLog(msg, type = "info") {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `> ${msg}`;
        dateLog.appendChild(entry);
        dateLog.scrollTop = dateLog.scrollHeight;
      }

      function excelSerialToDate(serial) {
        let num = Number(serial);
        if (isNaN(num) || num < 1) return null;
        return new Date((num - 25569) * 86400000);
      }

      function formatDate(date, format) {
        if (!date || isNaN(date.getTime())) return null;
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        const formats = {
          'DD/MM/YYYY': `${d}/${m}/${y}`,
          'MM/DD/YYYY': `${m}/${d}/${y}`,
          'YYYY/MM/YYYY': `${y}/${m}/${d}`,
          'YYYY-MM-DD': `${y}-${m}-${d}`,
          'DD-MM-YYYY': `${d}-${m}-${y}`,
          'MM-DD-YYYY': `${m}-${d}-${y}`
        };
        return formats[format] || `${d}/${m}/${y}`;
      }

      const columnSelect = card.querySelector('#dateColumnSelect');
      const formatSelect = card.querySelector('#dateFormatSelect');
      const applyBtn = card.querySelector('#applyDateBtn');
      const resetBtn = card.querySelector('#resetDateBtn');
      const progressFill = card.querySelector('#dateProgress');

      applyBtn.onclick = () => {
        const idx = parseInt(columnSelect.value);
        if (isNaN(idx) || idx < 0 || idx >= tempHeaders.length) {
          addDateLog("Invalid column selection", "error");
          return;
        }
        const colName = tempHeaders[idx];
        const fmt = formatSelect.value;
        let converted = 0;

        tempData.forEach((row) => {
          const dateObj = excelSerialToDate(row[colName]);
          if (dateObj) {
            const formatted = formatDate(dateObj, fmt);
            if (formatted && String(row[colName]) !== formatted) {
              row[colName] = formatted;
              converted++;
            }
          }
        });

        if (converted > 0) {
          convertedColumns.add(idx);
          addDateLog(`Converted ${converted} dates in column "${colName}" to ${fmt}`, "success");
          if (source.type === 'database') {
            syncBackFromExcel(source, tempData);
          }
          renderCards(false);
          progressFill.style.width = "100%";
          setTimeout(() => progressFill.style.width = "0%", 1000);
        } else {
          addDateLog("No numeric dates found in selected column", "warning");
        }
      };

      resetBtn.onclick = () => {
        const idx = parseInt(columnSelect.value);
        if (isNaN(idx) || idx < 0 || idx >= tempHeaders.length) {
          addDateLog("Invalid column selection", "error");
          return;
        }
        if (!convertedColumns.has(idx)) { addDateLog("Column not converted", "info"); return; }
        const colName = tempHeaders[idx];

        tempData.forEach((row, i) => {
          row[colName] = excelOriginalBackup[i]?.[colName] || row[colName];
        });
        convertedColumns.delete(idx);
        addDateLog(`Reset column "${colName}" to original`, "success");
        if (source.type === 'database') {
          syncBackFromExcel(source, tempData);
        }
        renderCards(false);
        progressFill.style.width = "100%";
        setTimeout(() => progressFill.style.width = "0%", 1000);
      };
    }

    function initExcelTextStripper(card, source, tempData, tempHeaders) {
      let textLog = card.querySelector('#textLog');

      function addTextLog(msg, type = "info") {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `> ${msg}`;
        textLog.appendChild(entry);
        textLog.scrollTop = textLog.scrollHeight;
      }

      const columnSelect = card.querySelector('#textColumnSelect');
      const wordInput = card.querySelector('#wordToStrip');
      const applyBtn = card.querySelector('#applyStripBtn');
      const progressFill = card.querySelector('#textProgress');

      applyBtn.onclick = () => {
        const col = columnSelect.value;
        if (!col) { addTextLog("Select a column", "error"); return; }
        const word = wordInput.value.trim();
        if (!word) { addTextLog("Enter text to strip", "error"); return; }
        const mode = card.querySelector('input[name="stripMode"]:checked').value;

        const escapedWord = word.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        let regex;
        if (mode === 'after') {
          regex = new RegExp('(' + escapedWord + ')' + '.*$', 'g');
        } else if (mode === 'before') {
          regex = new RegExp('^.*' + '(' + escapedWord + ')', 'g');
        } else {
          regex = new RegExp(escapedWord, 'g');
        }

        let count = 0;
        tempData.forEach(row => {
          if (row[col] !== undefined && row[col] !== null) {
            let textStr = String(row[col]).trim();
            if (mode === 'after') {
              textStr = textStr.replace(regex, '$1');
            } else if (mode === 'before') {
              textStr = textStr.replace(regex, '$1');
            } else {
              textStr = textStr.replace(regex, '');
            }
            const cleaned = textStr.replace(/^-+|-+$/g, '').trim();
            if (cleaned !== String(row[col])) {
              row[col] = cleaned;
              count++;
            }
          }
        });

        if (count > 0) {
          addTextLog(`Stripped "${word}" from ${count} cells (${mode} mode)`, "success");
          wordInput.value = "";
          if (source.type === 'database') {
            syncBackFromExcel(source, tempData);
          }
          renderCards(false);
          progressFill.style.width = "100%";
          setTimeout(() => progressFill.style.width = "0%", 1000);
        } else {
          addTextLog(`No occurrences of "${word}" found in column "${col}"`, "info");
        }
      };
    }

            <div class="log-entry log-info">> Ready. Enter start value and count.</div>

        </div>

    function initExcelSequenceGenerator(card, source, tempData, tempHeaders) {
      let seqLog = card.querySelector('#seqLog');

      function addSeqLog(msg, type = "info") {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `> ${msg}`;
        seqLog.appendChild(entry);
        seqLog.scrollTop = seqLog.scrollHeight;
      }

      const columnSelect = card.querySelector('#seqColumnSelect');
      const startInput = card.querySelector('#seqStartValue');
      const countInput = card.querySelector('#seqCount');
      const runBtn = card.querySelector('#runSeqBtn');
      const progressFill = card.querySelector('#seqProgress');

      runBtn.onclick = () => {
        const col = columnSelect.value;
        if (!col) { addSeqLog("Select a column", "error"); return; }

        const mode = card.querySelector('input[name="seqMode"]:checked').value;
        const count = parseInt(countInput.value) || 0;
        let startRaw = startInput.value.trim();

        if (!startRaw) { addSeqLog("Enter a starting number", "error"); return; }

        let currentVal;
        try {
          if (startRaw.length > 15) {
            currentVal = BigInt(startRaw);
          } else {
            currentVal = startRaw.includes('.') ? parseFloat(startRaw) : BigInt(startRaw);
          }
        } catch (e) {
          addSeqLog("Invalid number format", "error");
          return;
        }

        addSeqLog(`Executing sequence generation... Mode: ${mode}`, "info");

        if (mode === 'replace') {
          const limit = count > 0 ? Math.min(count, tempData.length) : tempData.length;
          for (let i = 0; i < limit; i++) {
            tempData[i][col] = currentVal.toString();
            currentVal = (typeof currentVal === 'bigint') ? currentVal + 1n : currentVal + 1;
          }
          addSeqLog(`Updated ${limit} rows in column "${col}"`, "success");
          progressFill.style.width = "100%";
        } else {
          if (count <= 0) { addSeqLog("Enter count for append mode", "error"); return; }
          for (let i = 0; i < count; i++) {
            let newRow = {};
            tempHeaders.forEach(h => {
              newRow[h] = (h === col ? currentVal.toString() : "");
            });
            tempData.push(newRow);
            currentVal = (typeof currentVal === 'bigint') ? currentVal + 1n : currentVal + 1;
            progressFill.style.width = `${((i + 1) / count) * 100}%`;
          }
          addSeqLog(`Appended ${count} new rows to column "${col}"`, "success");
        }

        if (source.type === 'database') {
          syncBackFromExcel(source, tempData);
        }
        setTimeout(() => {
          progressFill.style.width = "0%";
          renderCards(true);
        }, 1500);
      };
    }

    function initExcelDuplicateManager(card, source, tempData, tempHeaders) {
      let dupLog = card.querySelector('#dupLog');
      let dupStats = card.querySelector('#dupStats');

      function addDupLog(msg, type = "info") {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `> ${msg}`;
        dupLog.appendChild(entry);
        dupLog.scrollTop = dupLog.scrollHeight;
      }

      function getDuplicateGroups() {
        const colName = card.querySelector('#dupColumnSelect').value;
        if (!colName || !tempData.length) return new Map();
        const groupMap = new Map();
        tempData.forEach((row, idx) => {
          let rawVal = row[colName];
          let normVal = (rawVal !== undefined && rawVal !== null) ? String(rawVal).trim() : "";
          if (normVal === "") normVal = "(empty)";
          if (!groupMap.has(normVal)) groupMap.set(normVal, []);
          groupMap.get(normVal).push({ row, originalIndex: idx });
        });
        const duplicateGroups = new Map();
        for (let [val, rowsArr] of groupMap.entries()) {
          if (rowsArr.length > 1) {
            duplicateGroups.set(val, rowsArr);
          }
        }
        return duplicateGroups;
      }

      function getDuplicateRowsFlat() {
        const groups = getDuplicateGroups();
        const flat = [];
        for (let rowsArr of groups.values()) {
          rowsArr.forEach(item => flat.push(item.row));
        }
        return flat;
      }

      function getGroupedDuplicateRowsAllColumns() {
        const groups = getDuplicateGroups();
        if (groups.size === 0) return [];
        const resultRows = [];
        for (let [dupKey, rowsData] of groups.entries()) {
          rowsData.forEach((item, idx) => {
            const enhancedRow = { ...item.row };
            enhancedRow.__groupKey = dupKey;
            enhancedRow.__isFirstInGroup = (idx === 0);
            resultRows.push(enhancedRow);
          });
        }
        return resultRows;
      }

      function updateDupStats() {
        const colName = card.querySelector('#dupColumnSelect').value;
        if (!colName || !tempData.length) {
          dupStats.innerHTML = `⚡ Select column & upload data`;
          dupStats.style.background = "#e2e8f0";
          return;
        }
        const groups = getDuplicateGroups();
        const duplicateCount = Array.from(groups.values()).reduce((acc, arr) => acc + arr.length, 0);
        const uniqueDuplicateKeys = groups.size;
        if (uniqueDuplicateKeys === 0) {
          dupStats.innerHTML = `✅ No duplicates found in "${escapeHtml(colName)}"`;
          dupStats.style.background = "#dcfce7";
        } else {
          dupStats.innerHTML = `⚠️ ${duplicateCount} duplicate rows across ${uniqueDuplicateKeys} duplicate key(s)`;
          dupStats.style.background = "#fef3c7";
        }
      }

      function showDuplicatesInPreview(mode) {
        let displayData = [];
        let modeText = "";

        if (mode === 'filter') {
          displayData = getDuplicateRowsFlat();
          modeText = `Duplicate Rows (${displayData.length} rows)`;
        } else if (mode === 'pairs') {
          const grouped = getGroupedDuplicateRowsAllColumns();
          if (grouped.length === 0) {
            addDupLog("No duplicate groups found in selected column", "warning");
            return;
          }
          displayData = grouped;
          const uniqueGroups = new Set(grouped.map(r => r.__groupKey)).size;
          modeText = `Duplicate Pairs: ${displayData.length} rows (${uniqueGroups} groups)`;
        }

        if (displayData.length === 0) {
          addDupLog("No duplicates found", "info");
          return;
        }

        const cleanData = displayData.map(row => {
          const cleanRow = { ...row };
          delete cleanRow.__groupKey;
          delete cleanRow.__isFirstInGroup;
          return cleanRow;
        });

        tempData.length = 0;
        tempData.push(...cleanData);
        if (source.type === 'database') {
          syncBackFromExcel(source, tempData);
        }
        renderedRowCount = 0;
        renderCards(true);
        addDupLog(`Showing ${modeText} in main preview`, "success");
      }

      const columnSelect = card.querySelector('#dupColumnSelect');
      const previewBtn = card.querySelector('#previewDupBtn');
      const previewPairsBtn = card.querySelector('#previewPairsBtn');
      const removeBtn = card.querySelector('#removeDupsBtn');
      const progressFill = card.querySelector('#dupProgress');

      columnSelect.onchange = updateDupStats;
      updateDupStats();

      previewBtn.onclick = () => {
        const col = columnSelect.value;
        if (!col) { addDupLog("Select a column first", "error"); return; }
        showDuplicatesInPreview('filter');
      };

      previewPairsBtn.onclick = () => {
        const col = columnSelect.value;
        if (!col) { addDupLog("Select a column first", "error"); return; }
        showDuplicatesInPreview('pairs');
      };

      removeBtn.onclick = () => {
        const colName = columnSelect.value;
        if (!colName) { addDupLog("Select a column", "error"); return; }

        const seen = new Set();
        const newData = [];
        let removedCount = 0;
        let totalRows = tempData.length;

        tempData.forEach((row, idx) => {
          let val = String(row[colName] || "").trim() || "(empty)";
          if (!seen.has(val)) {
            seen.add(val);
            newData.push(row);
          } else {
            removedCount++;
          }
          progressFill.style.width = `${((idx + 1) / totalRows) * 100}%`;
        });

        tempData.length = 0;
        tempData.push(...newData);
        addDupLog(`🗑️ Removed ${removedCount} duplicate rows. Kept unique values based on "${colName}".`,
          "success");
        if (source.type === 'database') {
          syncBackFromExcel(source, tempData);
        }
        updateDupStats();
        renderedRowCount = 0;
        renderCards(true);
        setTimeout(() => progressFill.style.width = "0%", 1500);
      };
    }

    function initExcelSplitter(card, source, tempData, tempHeaders) {
      let splitLog = card.querySelector('#splitLog');

      function addSplitLog(msg, type = "info") {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        entry.textContent = `> ${msg}`;
        splitLog.appendChild(entry);
        splitLog.scrollTop = splitLog.scrollHeight;
      }

      function renderValues() {
        const col = card.querySelector('#splitColumnSelect').value;
        const container = card.querySelector('#splitValuesContainer');
        if (!col || !tempData.length) {
          container.innerHTML =
            '<div style="padding:10px; text-align:center; color:#64748b; font-size:11px;">Select a column to see values</div>';
          return;
        }
        const vals = [...new Set(tempData.map(row => String(row[col] || "").trim()))].filter(v => v !== "")
          .sort();
        if (vals.length === 0) {
          container.innerHTML =
            '<div style="padding:10px; text-align:center; color:#64748b; font-size:11px;">No values found in this column</div>';
          return;
        }
        container.innerHTML = vals.map(v => `
          <label class="checkbox-item">
            <input type="checkbox" class="split-val-chk" value="${escapeHtml(v)}" checked>
            <span style="font-size:11px;">${escapeHtml(v)}</span>
          </label>
        `).join('');
      }

      window.toggleSplitValues = function (state) {
        card.querySelectorAll('.split-val-chk').forEach(cb => cb.checked = state);
      };

      window.toggleSplitColumns = function (state) {
        card.querySelectorAll('.split-col-chk').forEach(cb => cb.checked = state);
      };

      const splitColumn = card.querySelector('#splitColumnSelect');
      const customName = card.querySelector('#splitCustomName');
      const runBtn = card.querySelector('#runSplitBtn');
      const progressFill = card.querySelector('#splitProgress');

      splitColumn.onchange = renderValues;
      renderValues();

      function getProcessedData(rows, allowedValues, splitCol, allowedCols) {
        let filteredRows = rows.filter(row => allowedValues.includes(String(row[splitCol] || "").trim()));
        return filteredRows.map(row => {
          let cleanRow = {};
          allowedCols.forEach(col => { cleanRow[col] = row[col]; });
          return cleanRow;
        });
      }

      runBtn.onclick = async () => {
        const splitCol = splitColumn.value;
        const selectedValues = Array.from(card.querySelectorAll('.split-val-chk:checked')).map(el => el.value);
        const selectedCols = Array.from(card.querySelectorAll('.split-col-chk:checked')).map(el => el.value);
        const exportMode = card.querySelector('input[name="splitMode"]:checked').value;
        const userPrefix = customName.value.trim().replace(/[\\/:*?"<>|]/g, "_");

        if (!splitCol) { addSplitLog("Please select split column", "error"); return; }
        if (selectedValues.length === 0) { addSplitLog("Select at least one value", "error"); return; }
        if (selectedCols.length === 0) { addSplitLog("Select at least one column", "error"); return; }

        card.querySelector('.progress-bar').style.display = 'block';
        progressFill.style.width = "10%";

        try {
          if (exportMode === "combined") {
            addSplitLog("Processing combined export...");
            const finalData = getProcessedData(tempData, selectedValues, splitCol, selectedCols);
            const ws = XLSX.utils.json_to_sheet(finalData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            const name = userPrefix || "Combined_Export";
            XLSX.writeFile(wb, `${name}.xlsx`);
            addSplitLog(`Combined Export successful! ${finalData.length} rows`, "success");
            progressFill.style.width = "100%";
          } else {
            addSplitLog("Generating ZIP archive...");
            const zip = new JSZip();
            selectedValues.forEach((val, i) => {
              const finalData = getProcessedData(tempData, [val], splitCol, selectedCols);
              const ws = XLSX.utils.json_to_sheet(finalData);
              const wb = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(wb, ws, "Data");
              const wbout = XLSX.write(wb, { type: "array", bookType: "xlsx" });
              const fileName = userPrefix ? `${userPrefix}_${val}` : val;
              zip.file(`${fileName.replace(/[\\/:*?"<>|]/g, "_")}.xlsx`, wbout);
              progressFill.style.width = `${((i + 1) / selectedValues.length) * 100}%`;
            });
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = userPrefix ? `${userPrefix}_Archive.zip` : `Split_Export.zip`;
            link.click();
            addSplitLog(`ZIP Export successful! ${selectedValues.length} files created`, "success");
          }
        } catch (err) {
          addSplitLog(err.message, "error");
        }
        setTimeout(() => {
          card.querySelector('.progress-bar').style.display = 'none';
          progressFill.style.width = "0%";
        }, 2000);
      };
    }

      function buildColumnCheckboxes(containerId, headers, prefix) {
        const container = document.getElementById(containerId);

          const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, blankrows: false, defval: "" });

          const data = [];
          for (let i = 1; i < raw.length; i++) {

        headers1.forEach(mh => {

      function loadFile(e, fileNum) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array', cellNF: true, cellText: true });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, blankrows: false, defval: "" });

      document.getElementById('runAdvMergeBtn').onclick = () => {
        const k1 = document.getElementById('advKey1').value;
        const k2 = document.getElementById('advKey2').value;
        if (!k1 || !k2) { addAdvLog("Select key columns for both files", "error"); return; }

        const selectedCols1 = Array.from(document.querySelectorAll('#advCols1 .adv-chk:checked')).map(el => el.value);
        const selectedCols2 = Array.from(document.querySelectorAll('#advCols2 .adv-chk:checked')).map(el => el.value);
        const mode = card.querySelector('input[name="advMergeMode"]:checked').value;

        // Get mapping
        const mappingSelects = document.querySelectorAll('.adv-mapping-select');
        const mapping = {};
        mappingSelects.forEach(sel => {
          const label = sel.closest('.d-flex').querySelector('span').textContent;
          if (sel.value) mapping[label] = sel.value;
        });

        const sourceLookup = new Map();
        data2.forEach(row => {
          let rawKey = row[k2];
          let cleanK = cleanValue(rawKey);
          if (cleanK !== "") sourceLookup.set(cleanK, row);
        });

        let masterMap = new Map();
        if (mode !== 'new') {
          data1.forEach(row => {
            let mKey = cleanValue(row[k1]);
            if (mKey !== "") masterMap.set(mKey, { ...row });
          });
        } else {
          data1.forEach(row => {
            let mKey = cleanValue(row[k1]);
            if (mKey !== "") masterMap.set(mKey, "EXISTS_FLAG");
          });
        }

        let updatedCount = 0,
          addedCount = 0;

        for (let [sourceKey, sourceRow] of sourceLookup.entries()) {
          if (sourceKey === "") continue;
          if (masterMap.has(sourceKey) && masterMap.get(sourceKey) !== "EXISTS_FLAG") {
            if (mode === 'both' || mode === 'update') {
              let existingRow = masterMap.get(sourceKey);
              let changed = false;
              for (let [masterField, sourceField] of Object.entries(mapping)) {
                if (sourceRow[sourceField] !== undefined && sourceRow[sourceField] !== null && String(sourceRow[sourceField]).trim() !== "") {
                  if (existingRow[masterField] !== sourceRow[sourceField]) {
                    existingRow[masterField] = sourceRow[sourceField];
                    changed = true;
                  }
                }
              }
              if (changed) {
                masterMap.set(sourceKey, existingRow);
                updatedCount++;
              }
            }
          } else if (!masterMap.has(sourceKey) && (mode === 'both' || mode === 'new')) {
            let newRow = {};
            headers1.forEach(col => newRow[col] = "");
            newRow[k1] = sourceRow[k2] || "";
            for (let [masterField, sourceField] of Object.entries(mapping)) {
              if (sourceRow[sourceField] !== undefined) newRow[masterField] = sourceRow[sourceField];
            }
            masterMap.set(sourceKey, newRow);
            addedCount++;
          }
        }

        if (mode === 'new') {
          for (let [k, v] of masterMap.entries())
            if (v === "EXISTS_FLAG") masterMap.delete(k);
        }

        const result = Array.from(masterMap.values());
        let statMsg = "";
        if (mode === 'update') statMsg = `${updatedCount} rows updated`;
        else if (mode === 'new') statMsg = `${addedCount} new rows added`;
        else statMsg = `${updatedCount} updated, ${addedCount} new`;
        addAdvLog(`Complete: ${statMsg}. Total: ${result.length} rows`, "success");

        // Clear existing data and replace with result
        const source = getCurrentDataSource();
        if (source) {
          if (source.type === 'excel') {
            excelData = [];
            excelHeaders = [];
          } else {
            workingTableRows = [];
            workingTableColumns = [];

        document.getElementById('advMergeProgress').style.width = "100%";
        setTimeout(() => {
          document.getElementById('advMergeProgress').style.width = "0%";
          renderCards(true);
          showToast(`Advanced merge complete! ${result.length} rows loaded`, 'success');
        }, 500);
      };

            raw[i].forEach((cell, idx) => { row[headers[idx]] = cleanValue(cell); });
            data.push(row);
          }

          const sel = document.getElementById('proxKey' + fileNum);
          sel.innerHTML = '<option value="">-- Choose Column --</option>';
          headers.forEach(h => { if (h) sel.innerHTML += `<option value="${h}">${h}</option>`; });
          sel.disabled = false;

          if (fileNum === 1) {
            data1 = data;
            headers1 = headers;
            buildColumnCheckboxes('proxCols1', headers1, '[Master]');
          } else {
            data2 = data;
            headers2 = headers;
            buildColumnCheckboxes('proxCols2', headers2, '[Search]');
          }

          document.getElementById('runProxBtn').disabled = !(data1.length && data2.length);
          addProxLog(`Loaded file ${fileNum}: ${data.length} rows`, "success");
        };
        reader.readAsArrayBuffer(file);
      }

      document.getElementById('proxFile1').onchange = (e) => loadFile(e, 1);
      document.getElementById('proxFile2').onchange = (e) => loadFile(e, 2);

      document.getElementById('runProxBtn').onclick = () => {
        const k1 = document.getElementById('proxKey1').value;
        const k2 = document.getElementById('proxKey2').value;
        const offset = parseInt(document.getElementById('proxOffset').value) || 0;
        const explicitNum = document.getElementById('proxExplicitNumber').value.trim().replace(/[^0-9]/g, '');
        const showStatus = document.getElementById('proxShowStatus').checked;

        if (!k1 || !k2) { addProxLog("Select key columns for both files", "error"); return; }

        const selectedCols1 = Array.from(document.querySelectorAll('#proxCols1 .prox-chk:checked')).map(el => el.value);
        const selectedCols2 = Array.from(document.querySelectorAll('#proxCols2 .prox-chk:checked')).map(el => el.value);

        const finalCols1 = selectedCols1.length ? selectedCols1 : headers1.filter(Boolean);
        const finalCols2 = selectedCols2.length ? selectedCols2 : headers2.filter(Boolean);

        // Build proximity logic
        let lowerBound, upperBound;
        if (offset >= 0) {
          lowerBound = -offset;
          upperBound = offset;
        } else {
          lowerBound = offset;
          upperBound = 0;
        }

        // Convert search data to numbers
        const searchList = data2.map(row => {
          const rawStr = String(row[k2] || '').trim().replace(/[^0-9]/g, '');
          let numVal = null;
          if (rawStr.length > 0) {
            try { numVal = BigInt(rawStr); } catch (e) { numVal = null; }
          }
          return { originalRow: row, numValue: numVal };
        }).filter(item => item.numValue !== null);

        // If explicit number is provided, filter search list
        let explicitNumVal = null;
        if (explicitNum.length > 0) {
          try { explicitNumVal = BigInt(explicitNum); } catch (e) { addProxLog("Invalid focus number", "error"); return; }
          const filtered = searchList.filter(item => {
            const diff = item.numValue - explicitNumVal;
            return diff >= BigInt(lowerBound) && diff <= BigInt(upperBound);
          });
          if (filtered.length === 0) { addProxLog("No matches found in search data for focus number", "warning"); return; }
          searchList.length = 0;
          searchList.push(...filtered);
        }

        const result = data1.map(mRow => {
          const masterRaw = String(mRow[k1] || '').trim().replace(/[^0-9]/g, '');
          let masterNum = null;
          if (masterRaw.length > 0) {
            try { masterNum = BigInt(masterRaw); } catch (e) { masterNum = null; }
          }

          let matchedRow = null;
          let foundDiff = "";

          if (masterNum !== null) {
            for (let item of searchList) {
              const diff = item.numValue - masterNum;
              if (diff >= BigInt(lowerBound) && diff <= BigInt(upperBound)) {
                matchedRow = item.originalRow;
                foundDiff = diff.toString();
                break;
              }
            }
          }

          let out = {};
          if (showStatus) {
            out["_system_status"] = matchedRow ? "MATCHED" : "NO_MATCH";
            out["_system_offset"] = matchedRow ? (foundDiff >= 0 ? "+" + foundDiff : foundDiff) : "";
          }

          finalCols1.forEach(k => {
            out[`[Master] ${k}`] = mRow[k] !== undefined ? mRow[k] : "";
          });

          finalCols2.forEach(k => {
            out[`[Search] ${k}`] = matchedRow && matchedRow[k] !== undefined ? matchedRow[k] : "#N/A";
          });

          return out;
        });

        const matchedCount = result.filter(r => r["_system_status"] === "MATCHED" || r["Status"] === "MATCHED").length;
        addProxLog(`Complete: ${matchedCount} matched, ${result.length - matchedCount} unmatched. Total: ${result.length} rows`, "success");

        // Clear existing data and replace with result
        const source = getCurrentDataSource();
        if (source) {
          if (source.type === 'excel') {
            excelData = [];
            excelHeaders = [];
          } else {
            workingTableRows = [];
            workingTableColumns = [];
          }
        }

        const newHeaders = Object.keys(result[0]);
        excelHeaders = newHeaders;
        excelData = result;
        isExcelMode = true;
        renderedRowCount = 0;
        selectedRows.clear();
        starredRows.clear();
        rowComments.clear();
        rowPriorities.clear();

        document.getElementById('proxProgress').style.width = "100%";
        setTimeout(() => {
          document.getElementById('proxProgress').style.width = "0%";
          renderCards(true);
          showToast(`Proximity merge complete! ${result.length} rows loaded`, 'success');
        }, 500);
      };
    }

    function loadSavedDatabase(dbName) {
      if (!savedDatabases[dbName]) {
