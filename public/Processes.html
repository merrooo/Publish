        return;
      }
      try {
        const { columns, rows, metadata } = parseFirebaseStructure(savedDatabases[dbName]);
        workingTableColumns = columns;
        workingTableRows = rows;
        editingRowIndex = null;
        currentLoadedDbName = dbName;
        selectedRows.clear();
        starredRows.clear();
        rowComments.clear();
        rowPriorities.clear();
        imageFileNames.clear();
        // Clear Excel data
        excelData = [];
        excelHeaders = [];
        isExcelMode = false;

        for (let idx in metadata) {
          const m = metadata[idx];
          if (m.comment) rowComments.set(parseInt(idx), m.comment);
          if (m.starred) starredRows.add(parseInt(idx));
          if (m.priority) rowPriorities.set(parseInt(idx), m.priority);
        }
        workingTableRows.forEach((_, i) => {
          if (!rowPriorities.has(i)) rowPriorities.set(i, 0);
        });

        renderCards();
        updateBulkDeleteButton();
        document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
        showToast(`Loaded "${dbName}" (${rows.length} rows)`, 'success');
      } catch (e) {
        console.error('Load error:', e);
        showToast('Error loading database', 'error');
      }
    }

    function parseFirebaseStructure(dbData) {
      if (!dbData) return { columns: [], rows: [], metadata: {} };
      const keys = Object.keys(dbData).filter(k => k.startsWith('row_')).sort();
      if (!keys.length) return { columns: [], rows: [], metadata: {} };
      const first = dbData[keys[0]];
      const colKeys = Object.keys(first).filter(k => k !== '_meta');
      const cols = colKeys.map(sanitizedKey => {
        const colData = first[sanitizedKey];
        const displayName = colData && colData['_originalName'] ? colData['_originalName'] :
          sanitizedKey;
        return {
          id: genColId(),
          name: displayName,
          type: colData ? colData.type : "text",
          options: colData ? colData.options || [] : [],
          dateFormat: colData ? colData.dateFormat || null : null,
          _sanitizedKey: sanitizedKey
        };
      });
      const rows = [];
      const meta = {};
      keys.forEach((key, idx) => {
        const row = dbData[key];
        const newRow = {};
        cols.forEach(c => {
          const sanitizedKey = c._sanitizedKey;
          newRow[c.id] = row[sanitizedKey] ? row[sanitizedKey].value : (c.type ===
            "number" ? 0 : c.type === "checkbox" ? false : c.type ===
              "image" ? [] : "");
        });
        rows.push(newRow);
        if (row['_meta']) {
          meta[idx] = {
            comment: row['_meta'].comment || '',
            starred: row['_meta'].starred || false,
            priority: row['_meta'].priority || 0
          };
        } else {
          meta[idx] = { comment: '', starred: false, priority: 0 };
        }
      });
      return { columns: cols, rows, metadata: meta };
    }

        <div id="saveUserDbList" class="mb-5 text-xs max-h-48 overflow-auto border border-white/15 rounded-xl p-2 bg-white/15 custom-scrollbar"></div>
        <div class="flex gap-2 mb-5"><input id="saveUserNewDbName" placeholder="New Database Name" class="input-modern flex-1 text-sm"><button id="saveUserCreateNewBtn" class="btn-modern text-sm px-5">Create</button></div>
        <button id="saveSelectedDbsBtn" class="btn-modern w-full py-3 text-sm">Save Selected Databases</button>`,
        (modal) => {
          modal.querySelector('#saveUserCreateNewBtn').onclick = createNewUserDatabase;
          modal.querySelector('#saveSelectedDbsBtn').onclick = () => {
            saveSelectedDatabases();
            modal.remove();
          };
          renderSaveUserDbList();
        }
      );
    }

    async function renderSaveUserDbList() {
      const c = document.getElementById('saveUserDbList');
      if (!c) return;
      await loadFromFirebase();
      if (Object.keys(savedDatabases).length === 0) {
        c.innerHTML = '<div class="text-center py-4 text-xs text-slate-400">No databases found</div>';
        return;
      }
      let html = '';
      for (let [name, db] of Object.entries(savedDatabases)) {
        const rows = db ? Object.keys(db).filter(k => k.startsWith('row_')).length : 0;
        const active = currentLoadedDbName === name;
        html +=
          `<div class="flex items-center justify-between py-3 border-b border-white/15 last:border-0"><div><div class="text-sm font-bold text-slate-700">${escapeHtml(name)}${active ? ' <span class="text-[10px] bg-indigo-100/40 text-indigo-700 px-2 rounded-full">active</span>' : ''}</div><div class="text-xs text-slate-500 mt-0.5">${rows} rows</div></div><div class="flex gap-4"><label class="text-xs flex items-center gap-1.5 cursor-pointer font-medium text-slate-600"><input type="checkbox" class="db-save-checkbox w-3.5 h-3.5 text-indigo-600 rounded" data-db="${escapeHtml(name)}" ${active ? 'checked' : ''}> Save</label><label class="text-xs flex items-center gap-1.5 cursor-pointer font-medium text-rose-600"><input type="checkbox" class="db-overwrite-checkbox w-3.5 h-3.5 text-rose-600 rounded" data-db="${escapeHtml(name)}"> Overwrite</label></div></div>`;
      }
      c.innerHTML = html;
    }

    async function saveSelectedDatabases() {
      const saves = document.querySelectorAll('.db-save-checkbox:checked');
      const overs = document.querySelectorAll('.db-overwrite-checkbox:checked');
      let cnt = 0;
      for (let cb of saves) {
        const name = cb.getAttribute('data-db');
        if (await saveToFirebase(name, false)) cnt++;
      }
      for (let cb of overs) {
        const name = cb.getAttribute('data-db');
        if (await saveToFirebase(name, true)) cnt++;
      }
      if (cnt > 0) {
        showToast(`Saved ${cnt} DB(s)`, 'success');
        await renderSaveUserDbList();
      } else {
        showToast('No database selected', 'info');
      }
      closeAllDropdowns();
    }

    async function createNewUserDatabase() {
      const name = document.getElementById('saveUserNewDbName')?.value?.trim();
      if (!name) { showToast('Enter name', 'error'); return; }
      if (savedDatabases[name]) { showToast('Already exists', 'error'); return; }
      if (excelData.length === 0 && workingTableColumns.length === 0) {
        showToast(
          'Add columns or import data first', 'error'); return;
      }
      await saveToFirebase(name, true);
      if (document.getElementById('saveUserNewDbName')) document.getElementById('saveUserNewDbName').value =
        '';
      await renderSaveUserDbList();
      showToast(`Created "${name}"`, 'success');
    }

    function showEditDatabaseModal(dbName) {
      const db = savedDatabases[dbName];
      if (!db) { showToast('Not found', 'error'); return; }
      const rows = db ? Object.keys(db).filter(k => k.startsWith('row_')).length : 0;
      showModal(`Edit Configuration`, `
        <div class="mb-4"><label class="text-xs font-bold text-slate-500 uppercase">Database Name</label><input id="editDbNameInput" value="${escapeHtml(dbName)}" class="input-modern mt-1"></div>
        <div class="bg-indigo-50/20 border border-indigo-100/20 p-4 rounded-xl text-sm text-indigo-900 mb-6 font-medium">
          <div class="flex justify-between mb-1"><span>Current Columns:</span> <span class="font-bold">${workingTableColumns.length}</span></div>
          <div class="flex justify-between mb-1"><span>Active Rows:</span> <span class="font-bold">${workingTableRows.length}</span></div>
          <div class="flex justify-between border-t border-indigo-200/20 pt-1 mt-1"><span>Stored Rows (Firebase):</span> <span class="font-bold">${rows}</span></div>
        </div>
        <div class="flex gap-2"><button class="pill-btn flex-1 bg-white/20 text-slate-700" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern flex-1" id="confirmEditDbBtn">Update Database</button></div>`,
        (modal) => {
          modal.querySelector('#confirmEditDbBtn').onclick = async () => {
            const newName = modal.querySelector('#editDbNameInput').value.trim();
            if (!newName) { showToast('Enter name', 'error'); return; }
            if (newName === dbName) {
              showToast('No change', 'info');
              modal.remove(); return;
            }
            if (savedDatabases[newName] && newName !== dbName) {
              showToast(
                'Already exists', 'error'); return;
            }
            modal.remove();
            try {
              let data = workingTableColumns.length && workingTableRows.length ?
                buildDatabaseStructure(dbName, workingTableColumns,
                  workingTableRows) :
                savedDatabases[dbName];
              delete savedDatabases[dbName];
              savedDatabases[newName] = data;
              await firebaseDB.ref('Project_1').set(savedDatabases);
              if (currentLoadedDbName === dbName) currentLoadedDbName = newName;
              document.getElementById("activeDbLabel").innerHTML =
                `📁 ${escapeHtml(newName)}`;
              showToast(`Renamed to "${newName}"`, 'success');
            } catch (e) { showToast('Error: ' + e.message, 'error'); }
          };
        }
      );
    }

    function buildDatabaseStructure(dbName, cols, rows) {
      const result = {};
      const processRows = rows.length === 0 ? [{}] : rows;
      processRows.forEach((row, ri) => {
        const key = `row_${ri + 1}`;
        result[key] = {};
        cols.forEach(c => {
          let v = row[c.id];
          if (c.type === 'date' && c.dateFormat && v) v = formatDate(v, c
            .dateFormat);
          const sanitizedName = sanitizeKey(c.name);
          result[key][sanitizedName] = {
            type: c.type,
            options: c.options || [],
            dateFormat: c.dateFormat || null,
            value: v !== undefined && v !== null ? v : (c.type ===
              "number" ? 0 : c.type === "checkbox" ? false :
              c.type === "image" ? [] : "")
          };
          result[key][sanitizedName]['_originalName'] = c.name;
        });
        const idx = ri;
        result[key]['_meta'] = {
          comment: rowComments.get(idx) || '',
          starred: starredRows.has(idx) || false,
          priority: rowPriorities.get(idx) || 0,
          updatedAt: new Date().toISOString()
        };
      });
      return result;
    }

    async function saveToFirebase(dbName, overwrite = false) {
      if (!firebaseDB) {
        showToast("Firebase not connected", "error");
        return false;
      }
      const source = getCurrentDataSource();
      if (!source) {
        showToast("Add data first", "error");
        return false;
      }
      if (!dbName) {
        showToast("Database name required", "error");
        return false;
      }

      try {
        let cols, rows;
        if (source.type === 'excel') {
          cols = source.headers.map(h => ({
            id: genColId(),
            name: h,
            type: "text",
            options: [],
            dateFormat: null
          }));
          rows = source.data;
        } else {
          cols = workingTableColumns;
          rows = workingTableRows;
        }

        const newStructure = buildDatabaseStructure(dbName, cols, rows);
        const newData = {};
        newData[dbName] = newStructure;

        let existingData = {};
        if (!overwrite && savedDatabases[dbName]) {
          existingData = savedDatabases[dbName];
        }

        if (!overwrite && existingData && Object.keys(existingData).length > 0) {
          for (let key in existingData) {
            if (!newData[dbName][key] && key.startsWith('row_')) {
              newData[dbName][key] = existingData[key];
            }
          }
        }

        const otherDbs = {};
        for (let k in savedDatabases) {
          if (k !== dbName) otherDbs[k] = savedDatabases[k];
        }
        const merged = { ...otherDbs, ...newData };

        await firebaseDB.ref('Project_1').set(merged);
        savedDatabases = merged;
        currentLoadedDbName = dbName;
        document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
        showToast(`Saved "${dbName}"`, 'success');
        return true;
      } catch (e) {
        console.error('Save error:', e);
        showToast('Save error: ' + e.message, 'error');
        return false;
      }
    }

    function formatDate(v, f) {
      if (!v) return '';
      let d;
      if (typeof v === 'string') {
        if (v.includes('/')) {
          const p = v.split('/');
          if (f === 'DD/MM/YYYY') d = new Date(p[2], p[1] - 1, p[0]);
          else if (f === 'MM/DD/YYYY') d = new Date(p[2], p[0] - 1, p[1]);
          else d = new Date(v);
        } else if (v.includes('-')) {
          const p = v.split('-');
          if (f === 'DD-MM-YYYY') d = new Date(p[2], p[1] - 1, p[0]);
          else if (f === 'YYYY-MM-DD') d = new Date(p[0], p[1] - 1, p[2]);
          else d = new Date(v);
        } else d = new Date(v);
      } else d = new Date(v);
      if (isNaN(d.getTime())) return v;
      const day = String(d.getDate()).padStart(2, '0'),
        month = String(d.getMonth() + 1).padStart(2, '0'),
        year = d.getFullYear();
      if (f === 'DD/MM/YYYY') return `${day}/${month}/${year}`;
      if (f === 'MM/DD/YYYY') return `${month}/${day}/${year}`;
      if (f === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
      return v;
    }

    function showRowOpsCard() {
      closeAllDropdowns();
      const btn = document.getElementById('rowOpsBtn');
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      const card = document.createElement('div');
      card.className = 'floating-dropdown p-2 shadow-2xl border border-white/15';
      card.style.width = 'auto';
      card.style.minWidth = '220px';
      card.style.top = (rect.bottom + 10) + 'px';
      card.style.left = (rect.left - 220) + 'px';
      if (parseInt(card.style.left) < 10) { card.style.left = '10px'; }
      const selCount = selectedRows.size;
      card.innerHTML =
        `<div class="drag-handle flex justify-between items-center mb-2 pb-2 border-b border-white/15"><span class="text-xs font-bold text-slate-500 uppercase tracking-wide"><i class="fas fa-grip-horizontal mr-1 opacity-50"></i> Row Ops</span><span class="close-dropdown" id="closeRowCard"><i class="fas fa-times"></i></span></div><div class="flex flex-col gap-1"><button id="menuAddRowBtn" class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-white/15 font-medium text-slate-700 hover:text-indigo-700 transition"><i class="fas fa-plus-circle mr-2 text-indigo-500"></i> Add New Row</button><div class="border-t border-white/15 my-1"></div><div class="text-[10px] uppercase font-bold text-slate-400 px-3 py-1 mt-1">Bulk Actions (${selCount} selected)</div><button id="menuBulkDeleteBtn" class="w-full text-left px-3 py-2 text-sm rounded-xl hover:bg-rose-50/30 font-medium text-slate-700 hover:text-rose-700 transition ${selCount === 0 ? 'opacity-50 cursor-not-allowed' : ''}"><i class="fas fa-trash-alt mr-2 text-rose-500"></i> Delete Rows</button></div>`;
      document.body.appendChild(card);
      makeDraggable(card);

      card.querySelector('#closeRowCard').onclick = () => card.remove();

      // Apply permissions to sub-buttons
      applyRowSubPermissions();

      card.querySelector('#menuAddRowBtn').onclick = () => {
        const source = getCurrentDataSource();
        if (!source) {
          showToast("Add columns or import data first", "error");
          card.remove();
          return;
        }
        const newRow = {};
        source.headers.forEach(h => newRow[h] = "");
        source.data.push(newRow);
        renderCards();
        card.remove();
        showToast('Row added', 'success');
      };

      card.querySelector('#menuBulkDeleteBtn').onclick = () => {
        if (selCount > 0) {
          bulkDeleteRows();
          card.remove();
        } else { showToast('Select rows first', 'info'); }
      };
    }

    function bulkDeleteRows() {
      const source = getCurrentDataSource();
      if (!source) { showToast('No data', 'error'); return; }
      if (selectedRows.size === 0) { showToast('No rows selected', 'error'); return; }
      showModal('Delete Rows', `
        <p class="text-sm text-slate-600 mb-6">Permanently delete ${selectedRows.size} selected row(s)?</p>
        <div class="flex gap-3 justify-end"><button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern text-sm px-5 bg-rose-500 hover:bg-rose-600" id="confirmBulkDeleteBtn">Delete</button></div>`,
        (modal) => {
          modal.querySelector('#confirmBulkDeleteBtn').onclick = () => {
            modal.remove();
            const sorted = Array.from(selectedRows).sort((a, b) => b - a);
            sorted.forEach(i => source.data.splice(i, 1));
            rowComments.clear();
            rowPriorities.clear();
            starredRows.clear();
            selectedRows.clear();
            if (source.type === 'database' && workingTableRows.length > 0) {
              workingTableRows.forEach((_, i) => rowPriorities.set(i, Date.now() - i));
            }
            renderCards();
            updateBulkDeleteButton();
            showToast(`Deleted ${sorted.length} rows`, 'success');
          };
        }
      );
    }

    // ===== INIT =====

      console.log('DOM loaded, initializing...');
      document.getElementById('loadingScreen').classList.remove('hidden');
      updateLoadingProgress(5, 'Firebase...');

        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseDB = firebase.database();
        console.log('Firebase initialized successfully');
        startFirebaseConnectionMonitor();
        updateLoadingProgress(15, 'Firebase connected');
      } catch (e) {
        console.warn('Firebase init error:', e);
        updateLoadingProgress(15, 'Firebase connection issue, using offline mode');
      }

      document.getElementById('dbActionsBtn').onclick = showDbActionsCard;
      document.getElementById('rowOpsBtn').onclick = showRowOpsCard;

      // Single-file operations (BLUE)

      document.getElementById('excelDateBtn').onclick = showExcelDateConverter;
      document.getElementById('excelTextBtn').onclick = showExcelTextStripper;
      document.getElementById('excelWordBtn').onclick = showExcelWordAdder;
      document.getElementById('excelSeqBtn').onclick = showExcelSequenceGenerator;
      document.getElementById('excelDupBtn').onclick = showExcelDuplicateManager;

      // SETTINGS SUB BUTTONS - Now in bottom bar
      document.getElementById('settingsExportJsonBtn').onclick = exportJSONData;
      document.getElementById('settingsExportExcelBtn').onclick = exportExcel;
      document.getElementById('settingsImportExcel').onchange = function (e) {

      document.getElementById('settingsAddPageBtn').onclick = function () {
        showModal('Redirect to Page',
          `<div class="mb-4">
            <div class="flex gap-2 flex-wrap mt-2">
                <a href="Main_App.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-home"></i> Main Page
                </a>
                <a href="SMART_Help.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-question-circle"></i> Help
                </a>
            </div>
            <div class="border-t border-white/15 my-3"></div>
            <p class="text-xs text-slate-400 mb-3">Or enter a custom URL below to redirect:</p>
          </div>
          <div class="mb-4">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Enter URL</label>
            <input id="settingsPageUrl" placeholder="https://www.google.com" class="input-modern text-sm mt-1">
          </div>
          <div class="flex gap-2 justify-end">
            <button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
            <button class="btn-modern text-sm" id="confirmRedirectBtn"><i class="fas fa-external-link-alt mr-1"></i> Redirect</button>
          </div>`,
          (modal) => {
            modal.querySelector('#confirmRedirectBtn').onclick = () => {
              const url = modal.querySelector('#settingsPageUrl').value.trim();
              if (!url) { showToast('Please enter a URL', 'error'); return; }
              // Check if URL has protocol, if not add https://
              let finalUrl = url;
              if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = 'https://' + url;
              }
              // Open in new tab
              window.open(finalUrl, '_blank');
              modal.remove();
              showToast(`Redirecting to ${finalUrl}`, 'success');
            };
          }
        );
      };

      document.getElementById('settingsSleepBtn').onclick = handleSleep;
      document.getElementById('settingsLogoutBtn').onclick = handleLogout;
      document.querySelectorAll('.theme-option-small').forEach(el => {
        el.onclick = function () { setTheme(this.getAttribute('data-theme')); };
      });

      const savedTheme = localStorage.getItem('selectedTheme') || 'light';
      setTheme(savedTheme);
      updateLoadingProgress(35, 'Session...');
      // Check for existing session from index.html
      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
      const savedUser = localStorage.getItem('currentUser');

      if (isLoggedIn && savedUser) {
        try {
          currentUser = JSON.parse(savedUser);
          showMainApp();
        } catch (e) {
          window.location.href = 'index.html';
          hideLoadingScreen();
        }
      } else {
        window.location.href = 'index.html';
        hideLoadingScreen();
      }
    });

    console.log('✅ Processes.html loaded successfully');
    console.log('✅ All settings sub-buttons are controlled by permissions');
    console.log('✅ Logout button is ALWAYS visible');
    console.log('✅ No default permissions are created - all controlled by control panel');
    console.log('✅ Import button is controlled by settingsImportExcel permission');
  </script>
