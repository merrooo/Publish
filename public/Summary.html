<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title> Nexus DB · Firebase Architect</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js">
    </script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
    </script>
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 0.5rem;
            margin: 0;
            background: linear-gradient(135deg, #e0e7ff, #ede9fe, #fae8ff);
            transition: all 0.3s;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .neo-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }

        .neo-card:hover {
            box-shadow: 0 24px 48px -12px rgba(79, 70, 229, 0.15);
        }

        .pill-btn {
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.15s;
            cursor: pointer;
        }

        .pill-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #a5b4fc;
            transform: translateY(-1px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            transition: all 0.2s;
            overflow: hidden;
        }

        .data-card:hover {
            border-color: rgba(199, 210, 254, 0.6);
            box-shadow: 0 8px 24px -8px rgba(79, 70, 229, 0.1);
        }

        .input-modern {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(226, 232, 240, 0.4);
            border-radius: 16px;
            padding: 0.5rem 1rem;
            transition: 0.15s;
            width: 100%;
        }

        .input-modern:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.6);
        }

        .btn-modern {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.35rem 1rem;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }

        .btn-modern::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .btn-modern:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-modern.small {
            font-size: 0.65rem;
            padding: 0.25rem 0.75rem;
            gap: 0.25rem;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 0.35rem 1rem;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.25s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.45);
            border-color: rgba(165, 180, 252, 0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .badge-comment {
            background: rgba(238, 242, 255, 0.6);
            backdrop-filter: blur(4px);
            color: #4f46e5;
            border-radius: 40px;
            padding: 0.1rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .priority-dot {
            width: 4px;
            height: 32px;
            background: #f59e0b;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 0 6px 6px 0;
        }

        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(199, 210, 254, 0.7);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(165, 180, 252, 0.9);
        }

        #cardsWrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            width: 100%;
            max-height: calc(100vh - 170px);
            min-height: 500px;
            overflow-y: auto;
            padding: 0.5rem 0.5rem 1rem 0.5rem;
        }

        .data-card {
            width: 100%;
            margin: 0;
        }

        .data-card .grid {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .theme-dark body {
            background: linear-gradient(135deg, #0b1120, #1a1a2e, #16213e);
        }

        .theme-dark .glass-card {
            background: rgba(20, 30, 50, 0.4);
            border-color: rgba(42, 58, 90, 0.4);
        }

        .theme-dark .neo-card {
            background: rgba(18, 27, 46, 0.4);
            border-color: rgba(30, 45, 68, 0.4);
        }

        .theme-dark .data-card {
            background: rgba(20, 31, 51, 0.4);
            border-color: rgba(30, 45, 68, 0.4);
        }

        .theme-dark .input-modern {
            background: rgba(26, 39, 64, 0.4);
            border-color: rgba(42, 58, 90, 0.4);
            color: #e2e8f0;
        }

        .theme-ocean body {
            background: linear-gradient(135deg, #064663, #0a4b6e, #1a7a9e);
        }

        .theme-ocean .glass-card {
            background: rgba(6, 70, 99, 0.5);
            border-color: rgba(56, 189, 248, 0.25);
        }

        .theme-ocean .neo-card {
            background: rgba(10, 75, 110, 0.4);
            border-color: rgba(30, 122, 158, 0.3);
        }

        .theme-ocean .data-card {
            background: rgba(10, 75, 110, 0.4);
            border-color: rgba(30, 122, 158, 0.3);
        }

        .theme-ocean .input-modern {
            background: rgba(13, 79, 117, 0.4);
            border-color: rgba(56, 189, 248, 0.25);
            color: #f0f9ff;
        }

        .floating-dropdown {
            position: fixed;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.18);
            padding: 1.25rem;
            min-width: 260px;
            max-width: 750px;
            width: auto;
            overflow: visible;
            transition: opacity 0.2s ease;
            max-height: 92vh;
            overflow-y: auto;
        }

        .floating-dropdown .drag-handle {
            cursor: grab;
            padding: 0.25rem 0.5rem;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.03);
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            user-select: none;
            width: 100%;
        }

        .floating-dropdown .drag-handle:active {
            cursor: grabbing;
        }

        .floating-dropdown .close-dropdown {
            cursor: pointer;
            padding: 0.25rem 0.7rem;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.12);
            transition: 0.15s;
            font-size: 0.9rem;
            color: #1e293b;
            border: 1px solid rgba(0, 0, 0, 0.08);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            min-height: 28px;
        }

        .floating-dropdown .close-dropdown:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #dc2626;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .theme-dark .floating-dropdown .close-dropdown {
            background: rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .theme-dark .floating-dropdown .close-dropdown:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .theme-ocean .floating-dropdown .close-dropdown {
            background: rgba(255, 255, 255, 0.12);
            color: #bae6fd;
            border-color: rgba(56, 189, 248, 0.2);
        }

        .theme-ocean .floating-dropdown .close-dropdown:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .floating-dropdown .dropdown-content {
            max-height: 550px;
            overflow: auto;
        }

        .floating-dropdown .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.04) 50%);
            border-radius: 0 0 28px 0;
        }

        .toast-notify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
            text-transform: uppercase;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .bottom-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .bottom-actions-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .excel-tool-content {
            max-height: 78vh;
            overflow-y: auto;
            padding: 0.25rem;
        }

        .excel-tool-content .compact-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
        }

        .excel-tool-content .compact-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.6);
        }

        .excel-tool-content .small-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .excel-tool-content .small-btn:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .excel-tool-content .small-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .excel-tool-content .feature-label {
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
            display: block;
        }

        .excel-tool-content .log-section {
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 8px;
            padding: 8px;
            margin-top: 8px;
            max-height: 80px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 10px;
        }

        .excel-tool-content .log-entry {
            margin-bottom: 2px;
        }

        .excel-tool-content .log-success {
            color: #4ade80;
        }

        .excel-tool-content .log-error {
            color: #f87171;
        }

        .excel-tool-content .log-info {
            color: #60a5fa;
        }

        .excel-tool-content .log-warning {
            color: #fbbf24;
        }

        .excel-tool-content .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .excel-tool-content .progress-fill {
            background: #6366f1;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .excel-tool-content .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px;
        }

        .excel-tool-content .filter-card-compact {
            background: #f8fafc;
            border-radius: 12px;
            padding: 6px 8px;
            border: 1px solid #e2e8f0;
        }

        .excel-tool-content .filter-card-compact h6 {
            font-size: 9px;
            font-weight: 800;
            color: #2563eb;
            margin-bottom: 4px;
        }

        .excel-tool-content .filter-list-compact {
            max-height: 80px;
            overflow-y: auto;
        }

        .excel-tool-content .filter-item-compact {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            padding: 2px 4px;
            cursor: pointer;
            border-radius: 4px;
        }

        .excel-tool-content .filter-item-compact:hover {
            background: #eef2ff;
        }

        .excel-tool-content .filter-item-compact.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .excel-tool-content .filter-item-compact input {
            width: 12px;
            height: 12px;
            margin: 0;
        }

        .excel-tool-content .badge-count {
            margin-left: auto;
            font-size: 8px;
            background: #e2e8f0;
            padding: 0px 6px;
            border-radius: 20px;
        }

        .excel-tool-content .dim-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            align-items: center;
        }

        .excel-tool-content .dim-row select {
            flex: 1;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 10px;
        }

        .excel-tool-content .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            color: #ef4444;
        }

        .excel-tool-content .summary-output {
            margin-top: 12px;
        }

        .excel-tool-content .filter-status-bar {
            background: #fef9c3;
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 6px;
            font-size: 9px;
            display: none;
        }

        .modal-overlay .neo-card .absolute {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 50%;
            transition: 0.15s;
        }

        .modal-overlay .neo-card .absolute:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .upload-zone-main {
            display: none !important;
        }

        .summary-preview-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .summary-preview-card .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .summary-preview-card .summary-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #4f46e5;
        }

        .summary-preview-card .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
        }

        .summary-preview-card .summary-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
        }

        .summary-preview-card .summary-item .label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-preview-card .summary-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
            margin-top: 0.25rem;
        }

        .summary-preview-card .summary-item .value.highlight {
            color: #4f46e5;
        }

        .summary-preview-card .summary-actions {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .summary-preview-card .summary-actions button {
            padding: 0.25rem 1rem;
            font-size: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .summary-preview-card .summary-actions .btn-outline {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1e293b;
        }

        .summary-preview-card .summary-actions .btn-outline:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .summary-preview-card .summary-actions .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
        }

        .summary-preview-card .summary-actions .btn-primary:hover {
            background: #4338ca;
        }

        .import-progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .import-progress-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .import-progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 16px 0;
        }

        .import-progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: width 0.3s;
            width: 0%;
        }

        .pivot-output-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 8px;
        }

        .pivot-output-table th {
            background: #f1f5f9;
            padding: 4px 6px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            font-weight: 700;
        }

        .pivot-output-table td {
            padding: 3px 6px;
            border-bottom: 1px solid #e2e8f0;
        }

        .pivot-output-table .total-row {
            background: #eef2ff;
            font-weight: 800;
            border-top: 2px solid #cbd5e1;
        }

        .load-more-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);

        function compressImage(file, maxDim = 600, q = 0.7) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const c = document.createElement('canvas');
                        let w = img.width,
                            h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) {
                                h = (h * maxDim) / w;
                                w = maxDim;
                            } else {
                                w = (w * maxDim) / h;
                                h = maxDim;
                            }
                        }
                        c.width = w;
                        c.height = h;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        const b64 = c.toDataURL('image/jpeg', q);
                        r({ base64: b64, filename: file.name || 'image' });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function initExcelCountSummaryWithMap(card, headers, dataSource, dataSourceName, columnMap) {
            let summaryLog = card.querySelector('#summaryLog');
            let summaryOutput = card.querySelector('#summaryOutput');
            let exportBtn = card.querySelector('#exportSummaryTableBtn');
            let currentSummaryData = null;

            function addSummaryLog(msg, type = "info") {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                entry.textContent = `> ${msg}`;
                summaryLog.appendChild(entry);
                summaryLog.scrollTop = summaryLog.scrollHeight;
            }

            function norm(val) {
                return (val === undefined || val === null) ? "" : String(val).trim();
            }

            function getRowValue(row, colName) {
                if (dataSourceName === 'Excel') {
                    return row[colName];
                }
                const colId = columnMap[colName];
                if (colId !== undefined) {
                    return row[colId];
                }
                return undefined;
            }

            function getCrossTabSummary() {
                const rowCol = card.querySelector('#groupColumnSelect').value;
                const colCol = card.querySelector('#countColumnSelect').value;
                const countType = card.querySelector('input[name="countType"]:checked').value;
                const valueCol = card.querySelector('#valueColumnSelect').value;

                if (!rowCol || !colCol) return null;

                const colValues = new Set();
                dataSource.forEach(row => {
                    let v = norm(getRowValue(row, colCol));
                    if (v !== "") colValues.add(v);
                });
                const sortedCols = Array.from(colValues).sort();

                const rowMap = new Map();

                for (let row of dataSource) {
                    let rowKey = norm(getRowValue(row, rowCol)) || "(blank)";
                    let colKey = norm(getRowValue(row, colCol)) || "(blank)";

                    if (!rowMap.has(rowKey)) {
                        let obj = {};
                        sortedCols.forEach(c => obj[c] = 0);
                        obj._total = 0;
                        rowMap.set(rowKey, obj);
                    }

                    let val = 1;
                    if (countType === 'sum' && valueCol) {
                        let num = parseFloat(getRowValue(row, valueCol));
                        if (!isNaN(num)) val = num;
                    }

                    let rowData = rowMap.get(rowKey);
                    rowData[colKey] = (rowData[colKey] || 0) + val;
                    rowData._total += val;
                }

                let colTotals = {};
                sortedCols.forEach(c => colTotals[c] = 0);
                let grandTotal = 0;

                let rows = [];
                for (let [rowKey, data] of rowMap.entries()) {
                    let rowObj = { rowKey };
                    sortedCols.forEach(c => {
                        rowObj[c] = data[c] || 0;
                        colTotals[c] += data[c] || 0;
                    });
                    rowObj._total = data._total;
                    grandTotal += data._total;
                    rows.push(rowObj);
                }
                rows.sort((a, b) => b._total - a._total);

                return {
                    rows, colHeaders: sortedCols, colTotals, grandTotal, rowCol, colCol, countType,
                    valueCol
                };
            }

            function renderSummary() {
                const sum = getCrossTabSummary();
                currentSummaryData = sum;

                if (!sum) {

                        '<div style="padding:20px; text-align:center; color:#64748b; font-size:11px;">Select columns and click Generate.</div>';
                    exportBtn.style.display = 'none';
                    return;
                }

                const { rows, colHeaders, colTotals, grandTotal, rowCol, colCol, countType } = sum;

                let html = `<div style="overflow-x:auto;">
          <table class="summary-count-table" style="min-width:100%;">
            <thead>
              <tr>
                <th style="background:#eef2ff; position:sticky; left:0; z-index:2;">${escapeHtml(rowCol)}</th>
                ${colHeaders.map(h => `<th style="background:#eef2ff;">${escapeHtml(h)}</th>`).join('')}
                <th style="background:#dbeafe; font-weight:800;">TOTAL</th>
              </tr>
            </thead>
            <tbody>`;

                for (let r of rows) {
                    html += `<tr>
                <td style="font-weight:600; position:sticky; left:0; background:white; z-index:1; border-right:2px solid #e2e8f0;">${escapeHtml(r.rowKey)}</td>`;
                    for (let h of colHeaders) {
                        html += `<td>${r[h] || 0}</td>`;
                    }
                    html += `<td style="font-weight:700; background:#f8fafc;">${r._total}</td></tr>`;
                }

                html += `<tr style="background:#eef2ff; font-weight:800; border-top:3px solid #cbd5e1;">
          <td style="position:sticky; left:0; background:#eef2ff; z-index:1;">المجموع</td>`;
                for (let h of colHeaders) {
                    html += `<td>${colTotals[h] || 0}</td>`;
                }
                html += `<td style="background:#dbeafe;">${grandTotal}</td></tr>`;

                html += `</tbody></table></div>`;

                html += `<div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; padding:12px; background:#f1f5f9; border-radius:8px;">
          <div><strong>📌 Row Groups:</strong> ${rows.length}</div>
          <div><strong>📊 Column Groups:</strong> ${colHeaders.length}</div>
          <div><strong>📈 Grand Total:</strong> ${grandTotal}</div>
          <div><strong>📋 Count Type:</strong> ${countType === 'sum' ? 'Sum of Values' : 'Count of Rows'}</div>
          <div><strong>📁 Data Source:</strong> ${dataSourceName} (${dataSource.length} rows)</div>
        </div>`;

                summaryOutput.innerHTML = html;
                exportBtn.style.display = 'block';
                addSummaryLog(
                    `Generated cross-tab: ${rows.length} rows × ${colHeaders.length} columns from ${dataSourceName}`,
                    "success");
                const progressFill = card.querySelector('#summaryProgress');
                progressFill.style.width = "100%";
                setTimeout(() => progressFill.style.width = "0%", 1500);
            }

            function exportSummaryTable() {
                if (!currentSummaryData) {
                    addSummaryLog("No summary data to export. Generate summary first.", "warning");
                    return;
                }

                const { rows, colHeaders, colTotals, grandTotal, rowCol, colCol, countType } =
                    currentSummaryData;

                const exportData = [];
                const headerRow = [rowCol, ...colHeaders, "TOTAL"];
                exportData.push(headerRow);

                for (let r of rows) {
                    const row = [r.rowKey];
                    for (let h of colHeaders) {
                        row.push(r[h] || 0);
                    }
                    row.push(r._total);
                    exportData.push(row);
                }

                const totalRow = ["المجموع"];
                for (let h of colHeaders) {
                    totalRow.push(colTotals[h] || 0);
                }
                totalRow.push(grandTotal);
                exportData.push(totalRow);

                const ws = XLSX.utils.aoa_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, `Cross Tab Summary (${dataSourceName})`);

                const colWidths = [];
                for (let i = 0; i < exportData[0].length; i++) {
                    let maxLen = 0;
                    for (let row of exportData) {
                        if (row[i] !== undefined) {
                            const len = String(row[i]).length;
                            if (len > maxLen) maxLen = len;
                        }
                    }
                    colWidths.push({ wch: Math.min(Math.max(maxLen + 3, 12), 30) });
                }
                ws['!cols'] = colWidths;

                const fileName =
                    `Cross_Tab_Summary_${dataSourceName}_${new Date().toISOString().slice(0, 10)}.xlsx`;
                XLSX.writeFile(wb, fileName);
                addSummaryLog(`✅ Exported cross-tab to "${fileName}"`, "success");
            }

            const groupSelect = card.querySelector('#groupColumnSelect');
            const countSelect = card.querySelector('#countColumnSelect');
            const valueSelect = card.querySelector('#valueColumnSelect');
            const generateBtn = card.querySelector('#generateCountSummaryBtn');

            for (let i = 0; i < headers.length; i++) {
                let h = headers[i].toLowerCase();
                if (h.includes('قطاع') || h.includes('sector') || h.includes('category') || h.includes(
                    'group')) {
                    groupSelect.value = headers[i];
                }
                if (h.includes('type') || h.includes('نوع') || h.includes('count') || h.includes('عدد')) {
                    countSelect.value = headers[i];
                    valueSelect.value = headers[i];
                }
            }

            generateBtn.onclick = renderSummary;
            exportBtn.onclick = exportSummaryTable;
            renderSummary();
        }

        // ===== EXCEL PIVOT STUDIO =====
        function showExcelPivotStudio() {

            card.innerHTML = `
        <div class="drag-handle flex justify-between items-center mb-3 border-b border-white/15 pb-3">
          <span class="text-xs font-bold text-slate-500 uppercase tracking-wide"><i class="fas fa-grip-horizontal mr-1 opacity-50"></i> Pivot Studio - ${dataSourceName}</span>
          <span class="close-dropdown" id="closeExcelPivot"><i class="fas fa-times"></i></span>
        </div>
        <div class="excel-tool-content">
          <div class="mb-3">
            <label class="feature-label">📊 Interactive Filters <span id="activeFilterCount" style="font-size:10px; font-weight:400; color:#64748b;">(0 active)</span></label>
            <div id="pivotFilterContainer" class="filter-grid">
              <div style="padding:20px; text-align:center; color:#64748b; font-size:11px;">Loading filters...</div>
            </div>
            <div id="filterStatusMsg" class="filter-status-bar"></div>
          </div>
          <div class="mb-3">
            <div class="d-flex gap-2 flex-wrap">
              <button id="applyPivotFiltersBtn" class="small-btn" style="flex:1;"><i class="fas fa-filter"></i> Apply Filters to Main Table</button>
              <button id="clearPivotFiltersBtn" class="small-btn" style="flex:1; background:#ef4444;"><i class="fas fa-eraser"></i> Clear Filters</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="feature-label">📐 Pivot Dimensions</label>
            <div id="pivotDimensionsList" class="mb-2"></div>
            <div class="d-flex gap-2 flex-wrap">
              <button id="addPivotDimBtn" class="small-btn" style="flex:1; background:#10b981;"><i class="fas fa-plus"></i> Add Dimension</button>
              <button id="generatePivotBtn" class="small-btn" style="flex:1;"><i class="fas fa-calculator"></i> Generate Count</button>
              <button id="resetPivotDimsBtn" class="small-btn" style="flex:1; background:#ef4444;"><i class="fas fa-undo"></i> Reset</button>
            </div>
          </div>
          <div id="pivotOutputArea" class="mt-2" style="max-height:250px; overflow-y:auto;"></div>
          <div id="pivotLog" class="log-section mt-2">
            <div class="log-entry log-info">> Select filters and dimensions to generate pivot summary.</div>
          </div>

        </div>
      `;
            document.body.appendChild(card);
            makeDraggable(card);

            initPivotWithDataSource(card, headers, dataSource, dataSourceName, columnMap);

        function initPivotWithDataSource(card, headers, dataSource, dataSourceName, columnMap) {
            let pivotLog = card.querySelector('#pivotLog');
            let pivotOutput = card.querySelector('#pivotOutputArea');
            let currentFilterSelections = {};
            let dimensionSelectors = [];
            let pivotFilteredData = [];

            function addPivotLog(msg, type = "info") {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                entry.textContent = `> ${msg}`;
                pivotLog.appendChild(entry);
                pivotLog.scrollTop = pivotLog.scrollHeight;
            }

            function escapeAttr(str) {
                return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
            }

            function norm(val) {
                return (val === undefined || val === null) ? "" : String(val).trim();
            }

            function getRowValue(row, colName) {
                if (dataSourceName === 'Excel') {
                    return row[colName];
                }
                const colId = columnMap[colName];
                if (colId !== undefined) {
                    return row[colId];
                }
                return undefined;
            }

            function getUniqueValues(colName) {
                const vals = new Set();
                dataSource.forEach(row => {
                    let v = norm(getRowValue(row, colName));
                    if (v !== "") vals.add(v);
                });
                return Array.from(vals).sort();
            }

            function getValidValuesForColumn(colName, selections) {
                let filtered = dataSource;
                for (let [otherCol, selectedSet] of Object.entries(selections)) {
                    if (otherCol === colName) continue;
                    if (selectedSet.size === 0) continue;
                    filtered = filtered.filter(row => selectedSet.has(norm(getRowValue(row,
                        otherCol))));
                }
                const valid = new Set();
                filtered.forEach(row => {
                    let v = norm(getRowValue(row, colName));
                    if (v !== "") valid.add(v);
                });
                return valid;
            }

            function getCountsForColumn(colName, selections) {
                let filtered = dataSource;
                for (let [otherCol, selectedSet] of Object.entries(selections)) {
                    if (otherCol === colName) continue;
                    if (selectedSet.size === 0) continue;
                    filtered = filtered.filter(row => selectedSet.has(norm(getRowValue(row,
                        otherCol))));
                }
                const countMap = new Map();
                filtered.forEach(row => {
                    let v = norm(getRowValue(row, colName));
                    if (v !== "") countMap.set(v, (countMap.get(v) || 0) + 1);
                });
                return countMap;
            }

            function getRowCountMatchingOtherSelections(targetCol, selections) {
                let filtered = dataSource;
                for (let [col, set] of Object.entries(selections)) {
                    if (col === targetCol) continue;
                    if (set.size === 0) continue;
                    filtered = filtered.filter(row => set.has(norm(getRowValue(row, col))));
                }
                return filtered.length;
            }

            function renderFilterCards() {
                const container = card.querySelector('#pivotFilterContainer');
                if (!headers.length) {
                    container.innerHTML =
                        '<div style="padding:20px; text-align:center; color:#64748b; font-size:11px;">No data loaded</div>';
                    return;
                }
                container.innerHTML = '';
                for (let col of headers) {
                    const uniqueVals = getUniqueValues(col);
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'filter-card-compact';
                    cardDiv.innerHTML = `
                <h6><i class="fas fa-tag"></i> ${escapeHtml(col)} <span class="badge-count" id="countHeader-${col.replace(/\s/g, '')}">0</span></h6>
                <div class="filter-list-compact" id="filterList-${col.replace(/\s/g, '')}"></div>
              `;
                    container.appendChild(cardDiv);

                    const listDiv = cardDiv.querySelector('.filter-list-compact');
                    uniqueVals.slice(0, 30).forEach(val => {
                        const isChecked = (currentFilterSelections[col] && currentFilterSelections[
                            col].has(val)) ? true : false;
                        const item = document.createElement('label');
                        item.className = 'filter-item-compact';
                        item.setAttribute('data-val', val);
                        item.innerHTML = `
                  <input type="checkbox" class="pivot-filter-chk" data-col="${escapeAttr(col)}" value="${escapeAttr(val)}" ${isChecked ? 'checked' : ''}>
                  <span>${escapeHtml(val.length > 20 ? val.substr(0, 17) + '...' : val)}</span>
                  <span class="badge-count" id="badge-${col}-${val.replace(/[^a-z0-9]/gi, '_')}">0</span>
                `;
                        listDiv.appendChild(item);
                    });
                    if (uniqueVals.length > 30) {
                        const more = document.createElement('div');
                        more.style.fontSize = '8px';
                        more.style.color = '#94a3b8';
                        more.style.padding = '2px 4px';
                        more.textContent = `+ ${uniqueVals.length - 30} more...`;
                        listDiv.appendChild(more);
                    }
                }
                attachFilterEvents();
                syncAllFilters();
            }

            function attachFilterEvents() {
                card.querySelectorAll('.pivot-filter-chk').forEach(chk => {
                    chk.removeEventListener('change', handlePivotFilterChange);
                    chk.addEventListener('change', handlePivotFilterChange);
                });
            }

            function handlePivotFilterChange(e) {
                const col = e.target.getAttribute('data-col');
                const val = e.target.value;
                if (!currentFilterSelections[col]) currentFilterSelections[col] = new Set();
                if (e.target.checked) currentFilterSelections[col].add(val);
                else currentFilterSelections[col].delete(val);
                if (currentFilterSelections[col].size === 0) delete currentFilterSelections[col];
                syncAllFilters();
            }

            function syncAllFilters() {
                for (let col of headers) {
                    const validSet = getValidValuesForColumn(col, currentFilterSelections);
                    const countsMap = getCountsForColumn(col, currentFilterSelections);
                    const totalRowsMatching = getRowCountMatchingOtherSelections(col,
                        currentFilterSelections);
                    const headerSpan = card.querySelector(`#countHeader-${col.replace(/\s/g, '')}`);
                    if (headerSpan) headerSpan.innerText = totalRowsMatching;
                    const listDiv = card.querySelector(`#filterList-${col.replace(/\s/g, '')}`);
                    if (!listDiv) continue;
                    const items = listDiv.querySelectorAll('.filter-item-compact');
                    items.forEach(item => {
                        const val = item.getAttribute('data-val');
                        const chk = item.querySelector('.pivot-filter-chk');
                        const isChecked = chk ? chk.checked : false;
                        const countVal = countsMap.get(val) || 0;
                        const badgeSpan = item.querySelector('.badge-count');
                        if (badgeSpan) badgeSpan.innerText = countVal;
                        if (!isChecked && !validSet.has(val)) item.classList.add('disabled');
                        else item.classList.remove('disabled');
                    });
                }
                const activeFiltersCount = Object.values(currentFilterSelections).reduce((acc, set) => acc +
                    set.size, 0);
                const countSpan = card.querySelector('#activeFilterCount');
                if (countSpan) countSpan.innerText = `(${activeFiltersCount} active)`;
                const msgDiv = card.querySelector('#filterStatusMsg');
                if (activeFiltersCount > 0) {
                    msgDiv.style.display = 'block';
                    msgDiv.innerHTML =
                        `<i class="fas fa-info-circle"></i> ${activeFiltersCount} filter(s) selected. Click "Apply Filters to Main Table" to update the main view.`;
                } else {
                    msgDiv.style.display = 'none';
                }
            }

            function applyFilters() {
                if (!dataSource.length) return;
                let filtered = [...dataSource];
                for (let [col, selectedSet] of Object.entries(currentFilterSelections)) {
                    if (selectedSet.size === 0) continue;
                    filtered = filtered.filter(row => selectedSet.has(norm(getRowValue(row, col))));
                }
                pivotFilteredData = filtered;
                filteredExcelData = filtered;
                isFiltered = true;

                renderedRowCount = 0;
                renderCards(true);
                addPivotLog(
                    `Applied filters: ${filtered.length} rows selected from ${dataSource.length} - Main table updated`,
                    "success");
                const progressFill = card.querySelector('#pivotProgress');
                progressFill.style.width = "100%";
                setTimeout(() => progressFill.style.width = "0%", 1000);
                updateDimensionDropdowns();
                const outputArea = card.querySelector('#pivotOutputArea');
                if (outputArea && outputArea.innerHTML !== '') {
                    generatePivotSummary();
                }
            }

            function clearFilters() {
                currentFilterSelections = {};
                pivotFilteredData = [];
                filteredExcelData = [];
                isFiltered = false;
                renderedRowCount = 0;
                renderCards(true);
                syncAllFilters();
                updateDimensionDropdowns();
                addPivotLog("All filters cleared - Main table restored", "info");
                const outputArea = card.querySelector('#pivotOutputArea');
                if (outputArea && outputArea.innerHTML !== '') {
                    generatePivotSummary();
                }
            }

            function updateDimensionDropdowns() {
                const container = card.querySelector('#pivotDimensionsList');
                const dataToUse = isFiltered && filteredExcelData.length > 0 ? filteredExcelData :
                    dataSource;
                if (!headers.length) {
                    container.innerHTML =
                        '<div style="font-size:11px; color:#94a3b8; padding:8px;">Upload data to enable dimensions</div>';
                    return;
                }
                if (dimensionSelectors.length === 0) addDimensionRow();
                refreshDimensionUI();
            }

            function refreshDimensionUI() {
                const container = card.querySelector('#pivotDimensionsList');
                container.innerHTML = '';
                dimensionSelectors.forEach((select, idx) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'dim-row';
                    rowDiv.innerHTML = `
                    <label style="font-weight:600; font-size:10px; min-width:45px;">Dim ${idx + 1}:</label>
                    <select class="compact-select pivot-dim-select" data-idx="${idx}" style="font-size:10px; padding:4px 8px; margin:0; flex:1;"></select>
                    <button class="btn-icon remove-pivot-dim" data-idx="${idx}" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;"><i class="fas fa-trash-alt"></i></button>
                  `;
                    container.appendChild(rowDiv);

                    const newSelect = rowDiv.querySelector('.pivot-dim-select');
                    let options = '<option value="">-- Select Column --</option>';
                    headers.forEach(h => {
                        options += `<option value="${escapeAttr(h)}">${escapeHtml(h)}</option>`;
                    });
                    newSelect.innerHTML = options;
                    if (select.value) newSelect.value = select.value;
                    newSelect.addEventListener('change', (e) => {
                        dimensionSelectors[idx].value = e.target.value;
                    });
                    rowDiv.querySelector('.remove-pivot-dim').addEventListener('click', () => {
                        if (dimensionSelectors.length <= 1) {
                            addPivotLog("At least one dimension required", "warning");
                            return;
                        }
                        dimensionSelectors.splice(idx, 1);
                        refreshDimensionUI();
                    });
                    dimensionSelectors[idx] = newSelect;
                });
            }

            function addDimensionRow() {
                const fake = document.createElement('select');
                fake.value = "";
                dimensionSelectors.push(fake);
                refreshDimensionUI();
            }

            function generatePivotSummary() {
                const dataToUse = isFiltered && filteredExcelData.length > 0 ? filteredExcelData :
                    dataSource;
                const selectedDims = dimensionSelectors.filter(sel => sel && sel.value && sel.value !== "")
                    .map(sel => sel.value);

                if (selectedDims.length === 0) {
                    addPivotLog("Select at least one dimension", "error");
                    return;
                }

                const groupMap = new Map();
                for (let row of dataToUse) {
                    let keyParts = selectedDims.map(dim => norm(getRowValue(row, dim)) || "(blank)");
                    let compositeKey = keyParts.join("|~|");
                    if (!groupMap.has(compositeKey)) {
                        groupMap.set(compositeKey, { keys: keyParts, count: 0 });
                    }
                    groupMap.get(compositeKey).count++;
                }

                const results = Array.from(groupMap.values())
                    .map(item => ({ dims: item.keys, count: item.count }))
                    .sort((a, b) => b.count - a.count);

                displayPivotOutput(results, selectedDims, dataToUse.length);
                addPivotLog(`Generated summary: ${results.length} groups from ${dataToUse.length} rows`,
                    "success");
                const progressFill = card.querySelector('#pivotProgress');
                progressFill.style.width = "100%";
                setTimeout(() => progressFill.style.width = "0%", 1500);
            }

            function displayPivotOutput(data, dimNames, totalRecordsSource) {
                if (!data.length) {
                    pivotOutput.innerHTML =
                        '<div style="padding:20px; text-align:center; color:#64748b; font-size:11px;">No data to display</div>';
                    return;
                }

                const total = data.reduce((sum, i) => sum + i.count, 0);
                let html = `
                  <div style="border:1px solid #e2e8f0; border-radius:8px; padding:12px; background:#f8fafc;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">
                      <strong style="font-size:11px;"><i class="fas fa-chart-simple"></i> Summary: ${data.length} groups | Total: ${total}${isFiltered ? ' (filtered)' : ''}</strong>
                      <div style="display:flex; gap:8px;">
                        <button id="exportPivotCsvBtn" class="small-btn" style="width:auto; padding:2px 12px; font-size:9px; background:#e2e8f0; color:#1e293b;"><i class="fas fa-file-csv"></i> CSV</button>
                        <button id="exportPivotExcelBtn" class="small-btn" style="width:auto; padding:2px 12px; font-size:9px; background:#10b981;"><i class="fas fa-file-excel"></i> Excel</button>
                      </div>
                    </div>
                    <div style="overflow-x:auto; max-height:200px;">
                      <table class="pivot-output-table">
                        <thead><tr>${dimNames.map(d => `<th>${escapeHtml(d)}</th>`).join('')}<th>COUNT</th></tr></thead>
                        <tbody>
                          ${data.map(item => `<tr>${item.dims.map(d => `<td>${escapeHtml(d)}</td>`).join('')}<td style="font-weight:bold;">${item.count}</td></tr>`).join('')}
                          <tr class="total-row"><td colspan="${dimNames.length}" style="text-align:right; font-weight:800;">TOTAL</td><td style="font-weight:800;">${total}</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                `;
                pivotOutput.innerHTML = html;

                card.querySelector('#exportPivotCsvBtn')?.addEventListener('click', () => {
                    exportPivotCSV(data, dimNames, total);
                });
                card.querySelector('#exportPivotExcelBtn')?.addEventListener('click', () => {
                    exportPivotExcel(data, dimNames, total);
                });
            }

            function exportPivotCSV(data, dimNames, total) {
                const rows = [dimNames.concat('COUNT')];
                data.forEach(item => {
                    rows.push([...item.dims, item.count]);
                });
                rows.push(dimNames.map(() => '').concat(total));
                const csvContent = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`)
                    .join(',')).join('\n');
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `pivot_summary_${Date.now()}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
                addPivotLog("CSV exported", "success");
            }

            function exportPivotExcel(data, dimNames, total) {
                const rows = [dimNames.concat('COUNT')];
                data.forEach(item => {
                    rows.push([...item.dims, item.count]);
                });
                rows.push(dimNames.map(() => '').concat(total));

                const ws = XLSX.utils.aoa_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Pivot Summary");

                const colWidths = [];
                for (let i = 0; i < rows[0].length; i++) {
                    let maxLen = 0;
                    for (let row of rows) {
                        if (row[i] !== undefined) {
                            const len = String(row[i]).length;
                            if (len > maxLen) maxLen = len;
                        }
                    }
                    colWidths.push({ wch: Math.min(Math.max(maxLen + 3, 12), 30) });
                }
                ws['!cols'] = colWidths;

                XLSX.writeFile(wb, `pivot_summary_${Date.now()}.xlsx`);
                addPivotLog("Excel exported", "success");
            }

            function resetDimensions() {
                dimensionSelectors = [];
                addDimensionRow();
                updateDimensionDropdowns();
                pivotOutput.innerHTML = '';
                addPivotLog("Dimensions reset", "info");
            }

            const applyBtn = card.querySelector('#applyPivotFiltersBtn');
            const clearBtn = card.querySelector('#clearPivotFiltersBtn');
            const addDimBtn = card.querySelector('#addPivotDimBtn');
            const generateBtn = card.querySelector('#generatePivotBtn');
            const resetBtn = card.querySelector('#resetPivotDimsBtn');

        window.deleteRow = function (idx) {
            showModal('Delete Row',
                `<p class="text-sm text-slate-600 mb-6">Permanently delete row #${idx + 1}?</p>
                <div class="flex gap-3 justify-end">
                  <button class="pill-btn text-xs bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                  <button class="btn-modern text-sm px-5" id="deleteConfirmBtn">Delete</button>
                </div>`,
                (modal) => {
                    modal.querySelector('#deleteConfirmBtn').onclick = () => {
                        modal.remove();
                        const dataToRender = getCurrentData();
                        if (dataToRender.length > 0) {
                            dataToRender.splice(idx, 1);
                            if (isFiltered) {
                                const origIdx = excelData.indexOf(dataToRender[idx]);
                                if (origIdx !== -1) excelData.splice(origIdx, 1);
                            }
                        } else {
                            workingTableRows.splice(idx, 1);
                        }
                        const ns = new Set(),
                            ns2 = new Set(),
                            nc = new Map(),
                            np = new Map();
                        selectedRows.forEach(r => {
                            if (r > idx) ns.add(r - 1);
                            else if (r < idx) ns.add(r);
                        });
                        starredRows.forEach(r => {
                            if (r > idx) ns2.add(r - 1);
                            else if (r < idx) ns2.add(r);
                        });
                        rowComments.forEach((v, k) => {
                            if (k > idx) nc.set(k - 1, v);
                            else if (k < idx) nc.set(k, v);
                        });
                        rowPriorities.forEach((v, k) => {
                            if (k > idx) np.set(k - 1, v);
                            else if (k < idx) np.set(k, v);

                        selectedRows = ns;
                        starredRows = ns2;

        window.updateCellValue = function (idx, colId, val) {

                    const n = parseFloat(val);
                    workingTableRows[idx][colId] = isNaN(n) ? 0 : n;

                    workingTableRows[idx][colId] = val;

        window.uploadImages = async function (rowIdx, colId, input) {
            if (!input.files.length) return;
            const files = Array.from(input.files);
            for (let file of files) {
                try {
                    const result = await compressImage(file);
                    const dataToRender = getCurrentData();
                    if (!dataToRender[rowIdx][colId]) dataToRender[rowIdx][colId] = [];
                    dataToRender[rowIdx][colId].push(result.base64);
                    imageFileNames.set(result.base64, result.filename);
                } catch (e) { showToast('Error uploading image', 'error'); }
            }
            input.value = '';
            renderCards(false);
            showToast(`${files.length} image(s) uploaded`, 'success');

            const dataToRender = getCurrentData();
            if (dataToRender[rowIdx] && dataToRender[rowIdx][colId] && Array.isArray(dataToRender[rowIdx][
                colId
            ])) {
                const removed = dataToRender[rowIdx][colId].splice(imgIdx, 1)[0];
                imageFileNames.delete(removed);
                renderCards(false);
                showToast('Image removed', 'info');
            }
        };

        function updatePriority(idx) {
            rowPriorities.set(idx, Date.now());
            reorderRowsByPriority();
        }

        function reorderRowsByPriority() {
            if (workingTableRows.length === 0) return;
            const arr = workingTableRows.map((r, i) => ({
                row: r, idx: i, priority: rowPriorities.get(i) ||
                    0
            }));
            arr.sort((a, b) => b.priority - a.priority);
            const newRows = arr.map(x => x.row);
            const newPriorities = new Map(),
                newComments = new Map(),
                newStarred = new Set(),
                newSelected = new Set();
            arr.forEach((x, newIdx) => {
                const old = x.idx;
                if (rowPriorities.has(old)) newPriorities.set(newIdx, rowPriorities.get(old));
                if (rowComments.has(old)) newComments.set(newIdx, rowComments.get(old));
                if (starredRows.has(old)) newStarred.add(newIdx);
                if (selectedRows.has(old)) newSelected.add(newIdx);
            });
            workingTableRows = newRows;
            rowPriorities = newPriorities;
            rowComments = newComments;
            starredRows = newStarred;
            selectedRows = newSelected;
            updateBulkDeleteButton();
        }

        }

        // ===== IMPORT EXCEL =====
        async function importExcelThroughSettings(file) {
            if (!file) return;

            const overlay = document.createElement('div');
            overlay.className = 'import-progress-overlay';
            overlay.id = 'importProgressOverlay';
            overlay.innerHTML = `
                        <div class="import-progress-card">
                          <h3 class="font-bold text-lg text-slate-800">Importing Excel...</h3>
                          <p id="importProgressText" class="text-sm text-slate-500 mt-2">Processing file: ${file.name}</p>
                          <div class="import-progress-bar">
                            <div id="importProgressFill" class="import-progress-fill" style="width: 0%"></div>
                          </div>
                          <p id="importStatusText" class="text-xs text-slate-400 mt-2">Reading data...</p>
                        </div>
                      `;
            document.body.appendChild(overlay);

            try {
                const reader = new FileReader();
                reader.onload = async function (e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        document.getElementById('importStatusText').textContent = 'Parsing Excel file...';
                        document.getElementById('importProgressFill').style.width = '30%';

                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        document.getElementById('importStatusText').textContent = 'Converting to JSON...';
                        document.getElementById('importProgressFill').style.width = '50%';

                        const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });
                        document.getElementById('importStatusText').textContent =
                            `Processing ${jsonData.length} rows...`;
                        document.getElementById('importProgressFill').style.width = '70%';

                        if (!jsonData.length) throw new Error("Empty file");

                        await new Promise(resolve => {
                            setTimeout(() => {
                                const headers = Object.keys(jsonData[0]);
                                excelHeaders = headers;
                                excelData = jsonData;
                                excelOriginalBackup = jsonData.map(r => ({ ...r }));
                                isExcelMode = true;
                                renderedRowCount = 0;
                                selectedRows.clear();
                                starredRows.clear();
                                rowComments.clear();
                                rowPriorities.clear();
                                imageFileNames.clear();
                                filteredExcelData = [];
                                isFiltered = false;

                                document.getElementById('importStatusText').textContent =
                                    `Loaded ${excelData.length} rows, ${excelHeaders.length} columns`;
                                document.getElementById('importProgressFill').style.width =
                                    '100%';

                                setTimeout(() => {
                                    overlay.remove();
                                    renderCards(true);
                                    showToast(
                                        `Successfully imported ${excelData.length} rows from ${file.name}`,
                                        'success');
                                }, 500);

                                resolve();
                            }, 100);
                        });
                    } catch (err) {
                        overlay.remove();
                        showToast("Error importing file: " + err.message, "error");
                    }
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                overlay.remove();
                showToast("Error: " + err.message, "error");
            }
        }

        // ===== OTHER FUNCTIONS =====
        function exportJSONData() {
            const dataToExport = getCurrentData();
            if (dataToExport.length === 0) { showToast("No data to export", "error"); return; }
            const data = {
                name: currentLoadedDbName || "Excel_Data",
                headers: excelHeaders,
                rows: dataToExport,
                metadata: {
                    comments: Array.from(rowComments.entries()),
                    starred: Array.from(starredRows),
                    priorities: Array.from(rowPriorities.entries())
                }
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `${currentLoadedDbName || 'data'}_export.json`;
            a.click();
            showToast("JSON exported", "success");
        }

        function exportExcel() {
            const dataToExport = getCurrentData();
            if (dataToExport.length === 0) { showToast("No data to export", "error"); return; }
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();

        function makeDraggable(el) {
            let isDragging = false,
                startX, startY, origX, origY;
            const handle = el.querySelector('.drag-handle') || el;
            handle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.close-dropdown')) return;
                isDragging = true;
                const rect = el.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;
                origX = rect.left;
                origY = rect.top;
                el.style.position = 'fixed';
                el.style.left = origX + 'px';
                el.style.top = origY + 'px';
                el.style.width = rect.width + 'px';
                el.style.right = 'auto';
                el.style.bottom = 'auto';
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                el.style.left = (e.clientX - startX) + 'px';
                el.style.top = (e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => { isDragging = false; });
        }
