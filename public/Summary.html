                if (!isLoggedIn || !savedUser) {
                    window.location.href = 'index.html';
                    return;
                }

                currentUser = JSON.parse(savedUser);
                document.getElementById('mainApp').style.display = 'block';
                updateLoadingProgress(30, 'Loading data...');
                await loadFromFirebase();
                updateLoadingProgress(70, 'Pages...');
                loadSavedPages();
                updateLoadingProgress(85, 'UI...');
                renderCards();
                setupInactivityListeners();
                await loadUserPermissions();
                setTimeout(() => {
                    updateLoadingProgress(100, 'Ready');
                    setTimeout(hideLoadingScreen, 400);
                }, 200);
            } catch (e) {
                console.error('Error in showMainApp:', e);
                window.location.href = 'index.html';
                hideLoadingScreen();
                showToast('Error loading app, please try again', 'error');
            }
        }

        async function loadFromFirebase() {
            if (!firebaseDB || isLoading) return;
            isLoading = true;
            try {
                const snap = await firebaseDB.ref('Project_1').get();
                savedDatabases = snap.exists() ? snap.val() : {};
                return true;
            } catch (e) {
                console.error('Load error:', e);
                return false;
            } finally {
                isLoading = false;
            }
        }

        // ===== LOAD / SWITCH DATABASE =====
        function showSwitchDbModal() {
            closeAllDropdowns();
            showModal('Available Databases', `
                        <div class="flex justify-between pb-2 border-b border-white/15 mb-2"><span class="text-xs font-bold text-slate-400 uppercase tracking-wide mt-1">Cloud Storage</span><button id="refreshDbList" class="text-indigo-500 hover:bg-white/15 p-1.5 rounded-md transition text-xs flex items-center gap-1"><i class="fas fa-sync-alt"></i> Refresh</button></div>
                        <div id="databaseListContainer" class="min-h-[100px] mb-2"></div>`,
                async (modal) => {
                    modal.querySelector('#refreshDbList').onclick = renderDatabaseList;
                    await renderDatabaseList();
                }
            );
        }

        async function renderDatabaseList() {
            const c = document.getElementById('databaseListContainer');
            if (!c) return;
            c.innerHTML =
                '<div class="flex justify-center py-8"><div class="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>';
            await loadFromFirebase();
            if (Object.keys(savedDatabases).length === 0) {
                c.innerHTML =
                    '<div class="px-3 py-6 text-sm text-slate-400 text-center bg-white/15 rounded-xl border border-white/15">No databases found</div>';
                return;
            }
            let html = '';
            for (let [name, db] of Object.entries(savedDatabases)) {
                const active = currentLoadedDbName === name;
                const rows = db ? Object.keys(db).filter(k => k.startsWith('row_')).length : 0;
                html +=
                    `<div class="flex items-center justify-between px-4 py-3 border-b border-white/15 hover:bg-white/15 transition cursor-pointer" data-db-name="${escapeHtml(name)}"><div class="flex flex-col"><span class="text-sm font-bold text-slate-700 ${active ? 'text-indigo-600' : ''}"><i class="fas fa-database mr-2 ${active ? 'text-indigo-500' : 'text-slate-400'}"></i>${escapeHtml(name)} ${active ? '<span class="text-[10px] bg-indigo-100/40 text-indigo-700 px-2 py-0.5 rounded-full ml-2">active</span>' : ''}</span><span class="text-xs text-slate-500 ml-6 mt-1">${rows} rows of data</span></div><button class="db-edit-btn text-slate-400 hover:bg-amber-100/30 hover:text-amber-600 p-2 rounded-lg transition" data-db-name="${escapeHtml(name)}"><i class="fas fa-pen"></i></button></div>`;
            }
            c.innerHTML = html;
            c.querySelectorAll('[data-db-name]').forEach(el => {
                el.onclick = (e) => {
                    if (e.target.closest('.db-edit-btn')) return;
                    const name = el.getAttribute('data-db-name');
                    loadSavedDatabase(name);
                    closeAllDropdowns();
                    document.querySelector('.modal-overlay')?.remove();
                };
            });
            c.querySelectorAll('.db-edit-btn').forEach(b => {
                b.onclick = e => {
                    e.stopPropagation();
                    const name = b.getAttribute('data-db-name');
                    loadSavedDatabase(name);
                    document.querySelector('.modal-overlay')?.remove();
                    showEditDatabaseModal(name);
                    closeAllDropdowns();
                };
            });
        }

        function loadSavedDatabase(dbName) {
            if (!savedDatabases[dbName]) {
                showToast("Database not found", "error");
                return;
            }
            try {
                const { columns, rows, metadata } = parseFirebaseStructure(savedDatabases[dbName]);
                workingTableColumns = columns;
                workingTableRows = rows;
                editingRowIndex = null;
                currentLoadedDbName = dbName;
                selectedRows.clear();
                starredRows.clear();
                rowComments.clear();
                rowPriorities.clear();
                imageFileNames.clear();
                excelData = [];
                excelHeaders = [];
                filteredExcelData = [];
                isFiltered = false;

                for (let idx in metadata) {
                    const m = metadata[idx];
                    if (m.comment) rowComments.set(parseInt(idx), m.comment);
                    if (m.starred) starredRows.add(parseInt(idx));
                    if (m.priority) rowPriorities.set(parseInt(idx), m.priority);
                }
                workingTableRows.forEach((_, i) => {
                    if (!rowPriorities.has(i)) rowPriorities.set(i, 0);
                });

                renderCards();
                updateBulkDeleteButton();
                document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
                showToast(`Loaded "${dbName}" (${rows.length} rows)`, 'success');
            } catch (e) {
                console.error('Load error:', e);
                showToast('Error loading database', 'error');
            }
        }

        function parseFirebaseStructure(dbData) {
            if (!dbData) return { columns: [], rows: [], metadata: {} };
            const keys = Object.keys(dbData).filter(k => k.startsWith('row_')).sort();
            if (!keys.length) return { columns: [], rows: [], metadata: {} };
            const first = dbData[keys[0]];
            const colKeys = Object.keys(first).filter(k => k !== '_meta');
            const cols = colKeys.map(sanitizedKey => {
                const colData = first[sanitizedKey];
                const displayName = colData && colData['_originalName'] ? colData['_originalName'] :
                    sanitizedKey;
                return {
                    id: genColId(),
                    name: displayName,
                    type: colData ? colData.type : "text",
                    options: colData ? colData.options || [] : [],
                    dateFormat: colData ? colData.dateFormat || null : null,
                    _sanitizedKey: sanitizedKey
                };
            });
            const rows = [];
            const meta = {};
            keys.forEach((key, idx) => {
                const row = dbData[key];
                const newRow = {};
                cols.forEach(c => {
                    const sanitizedKey = c._sanitizedKey;
                    newRow[c.id] = row[sanitizedKey] ? row[sanitizedKey].value : (c.type ===
                        "number" ? 0 : c.type === "checkbox" ? false : c.type ===
                            "image" ? [] : "");
                });
                rows.push(newRow);
                if (row['_meta']) {
                    meta[idx] = {
                        comment: row['_meta'].comment || '',
                        starred: row['_meta'].starred || false,
                        priority: row['_meta'].priority || 0
                    };
                } else {
                    meta[idx] = { comment: '', starred: false, priority: 0 };
                }
            });
            return { columns: cols, rows, metadata: meta };
        }

        function showEditDatabaseModal(dbName) {
            const db = savedDatabases[dbName];
            if (!db) { showToast('Not found', 'error'); return; }
            const rows = db ? Object.keys(db).filter(k => k.startsWith('row_')).length : 0;
            showModal(`Edit Configuration`, `
                        <div class="mb-4"><label class="text-xs font-bold text-slate-500 uppercase">Database Name</label><input id="editDbNameInput" value="${escapeHtml(dbName)}" class="input-modern mt-1"></div>
                        <div class="bg-indigo-50/20 border border-indigo-100/20 p-4 rounded-xl text-sm text-indigo-900 mb-6 font-medium">
                          <div class="flex justify-between mb-1"><span>Current Columns:</span> <span class="font-bold">${workingTableColumns.length}</span></div>
                          <div class="flex justify-between mb-1"><span>Active Rows:</span> <span class="font-bold">${workingTableRows.length}</span></div>
                          <div class="flex justify-between border-t border-indigo-200/20 pt-1 mt-1"><span>Stored Rows (Firebase):</span> <span class="font-bold">${rows}</span></div>
                        </div>
                        <div class="flex gap-2"><button class="pill-btn flex-1 bg-white/20 text-slate-700" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-modern flex-1" id="confirmEditDbBtn">Update Database</button></div>`,
                (modal) => {
                    modal.querySelector('#confirmEditDbBtn').onclick = async () => {
                        const newName = modal.querySelector('#editDbNameInput').value.trim();
                        if (!newName) { showToast('Enter name', 'error'); return; }
                        if (newName === dbName) {
                            showToast('No change', 'info');
                            modal.remove(); return;
                        }
                        if (savedDatabases[newName] && newName !== dbName) {
                            showToast(
                                'Already exists', 'error'); return;
                        }
                        modal.remove();
                        try {
                            let data = workingTableColumns.length && workingTableRows.length ?
                                buildDatabaseStructure(dbName, workingTableColumns,
                                    workingTableRows) :
                                savedDatabases[dbName];
                            delete savedDatabases[dbName];
                            savedDatabases[newName] = data;
                            await firebaseDB.ref('Project_1').set(savedDatabases);
                            if (currentLoadedDbName === dbName) currentLoadedDbName = newName;
                            document.getElementById("activeDbLabel").innerHTML =
                                `📁 ${escapeHtml(newName)}`;
                            showToast(`Renamed to "${newName}"`, 'success');
                        } catch (e) { showToast('Error: ' + e.message, 'error'); }
                    };
                }
            );
        }

        function buildDatabaseStructure(dbName, cols, rows) {
            const result = {};
            const processRows = rows.length === 0 ? [{}] : rows;
            processRows.forEach((row, ri) => {
                const key = `row_${ri + 1}`;
                result[key] = {};
                cols.forEach(c => {
                    let v = row[c.id];
                    if (c.type === 'date' && c.dateFormat && v) v = formatDate(v, c
                        .dateFormat);
                    const sanitizedName = sanitizeKey(c.name);
                    result[key][sanitizedName] = {
                        type: c.type,
                        options: c.options || [],
                        dateFormat: c.dateFormat || null,
                        value: v !== undefined && v !== null ? v : (c.type ===
                            "number" ? 0 : c.type === "checkbox" ? false :
                            c.type === "image" ? [] : "")
                    };
                    result[key][sanitizedName]['_originalName'] = c.name;
                });
                const idx = ri;
                result[key]['_meta'] = {
                    comment: rowComments.get(idx) || '',
                    starred: starredRows.has(idx) || false,
                    priority: rowPriorities.get(idx) || 0,
                    updatedAt: new Date().toISOString()
                };
            });
            return result;
        }

        async function saveToFirebase(dbName, overwrite = false) {
            if (!firebaseDB) {
                showToast("Firebase not connected", "error");
                return false;
            }
            if (excelData.length === 0 && workingTableColumns.length === 0) {
                showToast("Add data first", "error");
                return false;
            }
            if (!dbName) {
                showToast("Database name required", "error");
                return false;
            }

            try {
                let cols, rows;
                if (excelData.length > 0) {
                    cols = excelHeaders.map(h => ({
                        id: genColId(),
                        name: h,
                        type: "text",
                        options: [],
                        dateFormat: null
                    }));
                    rows = excelData;
                } else {
                    cols = workingTableColumns;
                    rows = workingTableRows;
                }

                const newStructure = buildDatabaseStructure(dbName, cols, rows);
                const newData = {};
                newData[dbName] = newStructure;

                let existingData = {};
                if (!overwrite && savedDatabases[dbName]) {
                    existingData = savedDatabases[dbName];
                }

                if (!overwrite && existingData && Object.keys(existingData).length > 0) {
                    for (let key in existingData) {
                        if (!newData[dbName][key] && key.startsWith('row_')) {
                            newData[dbName][key] = existingData[key];
                        }
                    }
                }

                const otherDbs = {};
                for (let k in savedDatabases) {
                    if (k !== dbName) otherDbs[k] = savedDatabases[k];
                }
                const merged = { ...otherDbs, ...newData };

                await firebaseDB.ref('Project_1').set(merged);
                savedDatabases = merged;
                currentLoadedDbName = dbName;
                document.getElementById("activeDbLabel").innerHTML = `📁 ${escapeHtml(dbName)}`;
                showToast(`Saved "${dbName}"`, 'success');
                return true;
            } catch (e) {
                console.error('Save error:', e);
                showToast('Save error: ' + e.message, 'error');
                return false;
            }
        }

        function formatDate(v, f) {
            if (!v) return '';
            let d;
            if (typeof v === 'string') {
                if (v.includes('/')) {
                    const p = v.split('/');
                    if (f === 'DD/MM/YYYY') d = new Date(p[2], p[1] - 1, p[0]);
                    else if (f === 'MM/DD/YYYY') d = new Date(p[2], p[0] - 1, p[1]);
                    else d = new Date(v);
                } else if (v.includes('-')) {
                    const p = v.split('-');
                    if (f === 'DD-MM-YYYY') d = new Date(p[2], p[1] - 1, p[0]);
                    else if (f === 'YYYY-MM-DD') d = new Date(p[0], p[1] - 1, p[2]);
                    else d = new Date(v);
                } else d = new Date(v);
            } else d = new Date(v);
            if (isNaN(d.getTime())) return v;
            const day = String(d.getDate()).padStart(2, '0'),
                month = String(d.getMonth() + 1).padStart(2, '0'),
                year = d.getFullYear();
            if (f === 'DD/MM/YYYY') return `${day}/${month}/${year}`;
            if (f === 'MM/DD/YYYY') return `${month}/${day}/${year}`;
            if (f === 'YYYY-MM-DD') return `${year}-${month}-${day}`;
            return v;
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function () {
            console.log('DOM loaded, initializing...');
            document.getElementById('loadingScreen').classList.remove('hidden');
            updateLoadingProgress(5, 'Firebase...');

                firebase.initializeApp(FIREBASE_CONFIG);
                firebaseDB = firebase.database();
                console.log('Firebase initialized successfully');
                startFirebaseConnectionMonitor();
                updateLoadingProgress(15, 'Firebase connected');
            } catch (e) {
                console.warn('Firebase init error:', e);
                updateLoadingProgress(15, 'Firebase connection issue, using offline mode');
            }

            document.getElementById('dbSwitchBtn').onclick = showSwitchDbModal;

            document.getElementById('excelSummaryBtn').onclick = showExcelCountSummary;
            document.getElementById('excelPivotBtn').onclick = showExcelPivotStudio;

            // SETTINGS SUB BUTTONS - Now in bottom bar
            document.getElementById('settingsExportJsonBtn').onclick = exportJSONData;
            document.getElementById('settingsExportExcelBtn').onclick = exportExcel;
            document.getElementById('settingsImportExcel').onchange = function (e) {
                if (this.files.length) {
                    for (let i = 0; i < this.files.length; i++) {
                        importExcelThroughSettings(this.files[i]);

                    this.value = '';
                    showToast(`Importing ${this.files.length} files...`, 'success');
                }
            };

            document.getElementById('settingsAddPageBtn').onclick = function () {
                showModal('Redirect to Page',
                    `<div class="mb-4">
            <div class="flex gap-2 flex-wrap mt-2">
                <a href="Main_App.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-home"></i> Main Page
                </a>
                <a href="SMART_Help.html" target="_blank" class="btn-glass small" onclick="closeModal('addPageModal')">
                    <i class="fas fa-question-circle"></i> Help
                </a>
            </div>
            <div class="border-t border-white/15 my-3"></div>
            <p class="text-xs text-slate-400 mb-3">Or enter a custom URL below to redirect:</p>
          </div>
          <div class="mb-4">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Enter URL</label>
            <input id="settingsPageUrl" placeholder="https://www.google.com" class="input-modern text-sm mt-1">
          </div>
          <div class="flex gap-2 justify-end">
            <button class="pill-btn text-sm bg-white/25" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
            <button class="btn-modern text-sm" id="confirmRedirectBtn"><i class="fas fa-external-link-alt mr-1"></i> Redirect</button>
          </div>`,
                    (modal) => {
                        modal.querySelector('#confirmRedirectBtn').onclick = () => {
                            const url = modal.querySelector('#settingsPageUrl').value.trim();
                            if (!url) { showToast('Please enter a URL', 'error'); return; }
                            // Check if URL has protocol, if not add https://
                            let finalUrl = url;
                            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                                finalUrl = 'https://' + url;
                            }
                            // Open in new tab
                            window.open(finalUrl, '_blank');
                            modal.remove();
                            showToast(`Redirecting to ${finalUrl}`, 'success');
                        };
                    }
                );
            };

            document.getElementById('settingsSleepBtn').onclick = handleSleep;
            document.getElementById('settingsLogoutBtn').onclick = handleLogout;
            document.querySelectorAll('.theme-option-small').forEach(el => {
                el.onclick = function () { setTheme(this.getAttribute('data-theme')); };
            });

            const savedTheme = localStorage.getItem('selectedTheme') || 'light';
            setTheme(savedTheme);
            // Check for existing session from index.html
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const savedUser = localStorage.getItem('currentUser');

            if (isLoggedIn && savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    showMainApp();
                } catch (e) {
                    window.location.href = 'index.html';
                    hideLoadingScreen();
                }
            } else {
                window.location.href = 'index.html';
                hideLoadingScreen();
            }
        });

        console.log('✅ Summary.html loaded successfully');
        console.log('✅ Settings sub-buttons moved to bottom-left!');
        console.log('✅ Logout button is ALWAYS visible');
        console.log('✅ All other buttons are controlled by permissions from control.html');
        console.log('✅ No default permissions are created - all controlled by control panel');
        console.log('✅ Import button is controlled by settingsImportExcel permission');
    </script>
